<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlUE | Jasaman Saini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        :root {
            --bg: #ffffff; --text-main: #111827; --text-muted: #6b7280;
            --card: #f9fafb; --border: rgba(0,0,0,0.07);
            --cosmic-purple: #7C3AED; --timeline: #e5e7eb;
        }
        body.dark {
            --bg: #0a0a0a; --text-main: #ffffff; --text-muted: #a1a1aa;
            --card: #141414; --border: rgba(255,255,255,0.07); --timeline: #27272a;
        }
        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
        }
        /* STICKY BAR */
        #sticky-bar {
            position: fixed; top: 1.1rem; left: 50%; transform: translateX(-50%);
            z-index: 500; display: flex; align-items: center; gap: 0.35rem;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 999px; padding: 0.3rem 0.55rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            transition: background 0.3s, border-color 0.3s; white-space: nowrap;
        }
        body.dark #sticky-bar { box-shadow: 0 2px 16px rgba(0,0,0,0.4); }
        .bar-divider { width:1px; height:14px; background:var(--border); margin:0 0.15rem; }
        .bar-back {
            display: inline-flex; align-items: center; gap: 0.35rem;
            color: var(--text-muted); font-size: 0.75rem; text-decoration: none;
            padding: 0.2rem 0.3rem; border-radius: 999px; transition: color 0.2s;
        }
        .bar-back:hover { color: var(--cosmic-purple); }
        .bar-back .back-arrow { transition: transform 0.2s; }
        .bar-back:hover .back-arrow { transform: translateX(-2px); }
        .bar-btn {
            background: none; border: none; border-radius: 999px;
            padding: 0.25rem 0.4rem; cursor: pointer; color: var(--text-muted);
            transition: color 0.2s; line-height: 1;
            display: flex; align-items: center; font-size: 0.85rem; font-family: inherit;
        }
        .bar-btn:hover { color: var(--cosmic-purple); }
        .bar-nav-btn {
            background: none; border: none; padding: 0.2rem 0.3rem;
            cursor: pointer; color: var(--text-muted); font-size: 0.72rem;
            border-radius: 999px; transition: color 0.2s; font-family: inherit;
            display: inline-flex; align-items: center; gap: 0.3rem;
        }
        .bar-nav-btn:hover { color: var(--cosmic-purple); }
        .bar-nav-btn.disabled { opacity: 0.25; pointer-events: none; }
        /* POST */
        #page {
            max-width: 48rem; margin: 0 auto;
            padding: 5rem 1.5rem 4rem;
        }
        .post-title {
            font-size: 1.6rem; font-weight: 600;
            letter-spacing: -0.02em; margin-bottom: 0.35rem; line-height: 1.2;
        }
        .post-meta {
            font-size: 0.72rem; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 2rem;
        }
        .post-image { width: 100%; margin-bottom: 1.5rem; }
        .post-image img { width: 100%; height: auto; display: block; border-radius: 0.6rem; }
        .post-image-caption {
            margin-top: 0.4rem; font-size: 0.68rem;
            color: var(--text-muted); text-align: center;
        }
        .post-body { font-size: 0.93rem; line-height: 1.8; color: var(--text-main); }
        .post-body p { margin-bottom: 1.1rem; }
        .post-divider { height: 1px; background: var(--timeline); margin: 2.5rem 0; }
        footer {
            max-width: 48rem; margin: 0 auto;
            padding: 1.5rem; border-top: 1px solid var(--timeline);
            display: flex; justify-content: space-between;
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 0.15em; color: var(--text-muted);
        }
        footer a { color: var(--text-muted); text-decoration: none; }
    </style>
</head>
<body>
    <div id="sticky-bar">
        <a href="blue.html" class="bar-back" id="bar-back">
            <i class="fa-solid fa-arrow-left back-arrow" style="font-size:0.7rem;"></i>
            <span>BlUE</span>
        </a>
        <div class="bar-divider"></div>
        <button class="bar-nav-btn disabled" id="btn-prev"><i class="fa-solid fa-chevron-left" style="font-size:0.65rem;"></i></button>
        <button class="bar-nav-btn disabled" id="btn-next"><i class="fa-solid fa-chevron-right" style="font-size:0.65rem;"></i></button>
        <div class="bar-divider"></div>
        <button class="bar-btn" id="theme-toggle" aria-label="Toggle dark mode">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </div>

    <div id="page">
        <div class="post-title" id="post-title"></div>
        <div class="post-meta"  id="post-meta"></div>
        <div id="post-content"></div>
        <div class="post-divider"></div>
    </div>

    <footer>
        <span>&copy; 2026 Jasaman Saini</span>
        <a href="index.html">Homepage</a>
    </footer>

    <script>
    // THEME
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('theme-icon').className = 'fa-solid fa-sun';
    }
    document.getElementById('theme-toggle').addEventListener('click', function() {
        var isDark = document.body.classList.toggle('dark');
        document.getElementById('theme-icon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ---- ALL POSTS (same list as blue.html, only needs id + nav info here) ----
    // Full post data: images & body are defined here per post.
    var posts = [
        {
            id: 'ffm-01', title: 'Along the Main', date: 'Mar 2025', location: 'Frankfurt',
            images: [ { src: 'https://placehold.co/1200x800/e8e3db/888?text=Along+the+Main', caption: 'Riverbank, Frankfurt' } ],
            body: ['Replace this with your text for the post. You can write as much as you like here.']
        },
        {
            id: 'ffm-02', title: 'Sachsenhausen', date: 'Feb 2025', location: 'Frankfurt',
            images: [ { src: 'https://placehold.co/800x1100/d5dce8/888?text=Sachsenhausen', caption: '' } ],
            body: ['Replace this with your text for the post.']
        },
        {
            id: 'ffm-03', title: 'Skyline at dusk', date: 'Jan 2025', location: 'Frankfurt',
            images: [ { src: 'https://placehold.co/1400x900/e8dbd5/888?text=Skyline', caption: '' } ],
            body: ['Replace this with your text for the post.']
        },
        {
            id: 'seoul-01', title: 'Hangang', date: 'Nov 2024', location: 'Seoul',
            images: [
                { src: 'https://placehold.co/1200x800/dce8d5/888?text=Hangang+River', caption: 'Han River at night' },
                { src: 'https://placehold.co/900x1200/d5e8e0/888?text=Hangang+II',    caption: '' }
            ],
            body: ['Replace this with your text.', 'Each string in the body array becomes a paragraph.']
        },
        {
            id: 'seoul-02', title: 'Insadong', date: 'Oct 2024', location: 'Seoul',
            images: [ { src: 'https://placehold.co/800x1000/e8e3d5/888?text=Insadong', caption: '' } ],
            body: ['Replace this with your text for the post.']
        },
        {
            id: 'seoul-03', title: 'Bukchon after rain', date: 'Sep 2024', location: 'Seoul',
            images: [ { src: 'https://placehold.co/1100x750/d5e8e8/888?text=Bukchon', caption: 'Bukchon Hanok Village' } ],
            body: ['Replace this with your text for the post.']
        },
        {
            id: 'tokyo-01', title: 'Shimokitazawa', date: 'Dec 2022', location: 'Tokyo',
            images: [ { src: 'https://placehold.co/900x1200/e8d5e0/888?text=Shimokita', caption: '' } ],
            body: ['Replace this with your text for the post.']
        },
        {
            id: 'tokyo-02', title: 'Yanaka', date: 'Nov 2022', location: 'Tokyo',
            images: [ { src: 'https://placehold.co/1200x800/ddd5e8/888?text=Yanaka', caption: 'Yanaka cemetery path' } ],
            body: ['Replace this with your text for the post.']
        },
        {
            id: 'tokyo-03', title: 'Koenji', date: 'Oct 2022', location: 'Tokyo',
            images: [ { src: 'https://placehold.co/800x1100/e8e8d5/888?text=Koenji', caption: '' } ],
            body: ['Replace this with your text for the post.']
        }
    ];

    var ids = posts.map(function(p){ return p.id; });

    // Read ?id= from URL
    var params = new URLSearchParams(window.location.search);
    var currentId = params.get('id') || ids[0];
    var post = posts.find(function(p){ return p.id === currentId; });
    var idx  = ids.indexOf(currentId);

    if (!post) { window.location = 'blue.html'; }

    // Render
    document.title = post.title + ' | BlUE';
    document.getElementById('post-title').textContent = post.title;
    document.getElementById('post-meta').textContent  = post.location + ' \u2014 ' + post.date;

    var html = '';
    post.images.forEach(function(img) {
        html += '<div class="post-image">'
            + '<img src="' + img.src + '" alt="' + (img.caption || post.title) + '" loading="lazy">'
            + (img.caption ? '<div class="post-image-caption">' + img.caption + '</div>' : '')
            + '</div>';
    });
    if (post.body && post.body.length) {
        html += '<div class="post-body">';
        post.body.forEach(function(p){ if(p) html += '<p>' + p + '</p>'; });
        html += '</div>';
    }
    document.getElementById('post-content').innerHTML = html;

    // Prev / Next in bar
    var prevBtn = document.getElementById('btn-prev');
    var nextBtn = document.getElementById('btn-next');
    if (idx > 0) {
        prevBtn.classList.remove('disabled');
        prevBtn.addEventListener('click', function(){ window.location = 'blue-post.html?id=' + ids[idx-1]; });
    }
    if (idx < ids.length - 1) {
        nextBtn.classList.remove('disabled');
        nextBtn.addEventListener('click', function(){ window.location = 'blue-post.html?id=' + ids[idx+1]; });
    }
    </script>
</body>
</html>
