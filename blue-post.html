<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; img-src 'self' data: https://raw.githubusercontent.com; connect-src 'self';">
    <title>BlUE | Jasaman Saini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        :root {
            --bg: #ffffff; --text-main: #111827; --text-muted: #6b7280;
            --card: #f9fafb; --border: rgba(0,0,0,0.07);
            --cosmic-purple: #7C3AED; --timeline: #e5e7eb;
        }
        body.dark {
            --bg: #0a0a0a; --text-main: #ffffff; --text-muted: #a1a1aa;
            --card: #141414; --border: rgba(255,255,255,0.07); --timeline: #27272a;
        }
        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
        }
        #sticky-bar {
            position: fixed; top: 1.1rem; left: 50%; transform: translateX(-50%);
            z-index: 500; display: flex; align-items: center; gap: 0.35rem;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 999px; padding: 0.3rem 0.55rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            transition: background 0.3s, border-color 0.3s; white-space: nowrap;
        }
        body.dark #sticky-bar { box-shadow: 0 2px 16px rgba(0,0,0,0.4); }
        .bar-divider { width:1px; height:14px; background:var(--border); margin:0 0.15rem; }
        .bar-back {
            display: inline-flex; align-items: center; gap: 0.35rem;
            color: var(--text-muted); font-size: 0.75rem; text-decoration: none;
            padding: 0.2rem 0.3rem; border-radius: 999px; transition: color 0.2s;
        }
        .bar-back .back-arrow { transition: transform 0.2s; }
        .bar-btn {
            background: none; border: none; border-radius: 999px;
            padding: 0.25rem 0.4rem; cursor: pointer; color: var(--text-muted);
            transition: color 0.2s; line-height: 1;
            display: flex; align-items: center; font-size: 0.85rem; font-family: inherit;
        }
        .bar-nav-btn {
            background: none; border: none; padding: 0.2rem 0.3rem;
            cursor: pointer; color: var(--text-muted); font-size: 0.72rem;
            border-radius: 999px; transition: color 0.2s; font-family: inherit;
            display: inline-flex; align-items: center; gap: 0.3rem;
        }
        .bar-nav-btn.disabled { opacity: 0.25; pointer-events: none; }
        @media (hover: hover) and (pointer: fine) {
            .bar-back:hover { color: var(--cosmic-purple); }
            .bar-back:hover .back-arrow { transform: translateX(-2px); }
            .bar-btn:hover { color: var(--cosmic-purple); }
            .bar-nav-btn:hover { color: var(--cosmic-purple); }
        }
        #page-wrap {
            position: relative;
            max-width: 48rem;
            margin: 0 auto;
            padding: 5rem 1.5rem 0;
        }
        #sidebar { display: none; }
        @media (min-width: 900px) {
            #sidebar {
                display: block;
                position: fixed;
                left: calc(50% - 24rem - 1.5rem - 8rem);
                top: 5.5rem;
                width: 8rem;
            }
            .sidebar-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.13em; color: var(--text-muted); margin-bottom: 0.4rem; }
            .sidebar-category { font-size: 0.78rem; font-weight: 500; color: var(--cosmic-purple); line-height: 1.4; text-transform: uppercase; letter-spacing: 0.13em; }
        }
        .mobile-category {
            display: block; font-size: 0.68rem; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.13em;
            color: var(--cosmic-purple); margin-bottom: 0.45rem;
        }
        @media (min-width: 900px) { .mobile-category { display: none; } }
        .post-title { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.35rem; line-height: 1.2; }
        .post-meta { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 2rem; }
        .post-image { width: 100%; margin-bottom: 1.5rem; }
        .post-image img { width: 100%; height: auto; display: block; border-radius: 0.6rem; }
        .post-image-caption { margin-top: 0.4rem; font-size: 0.68rem; color: var(--text-muted); text-align: center; }
        .post-body { font-size: 0.93rem; line-height: 1.8; color: var(--text-main); }
        .post-body p { margin-bottom: 1.1rem; }
        footer {
            padding: 1.5rem 0;
            margin-top: 3rem;
            border-top: 1px solid var(--timeline);
            display: flex; justify-content: space-between;
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 0.15em; color: var(--text-muted);
        }
        footer a { color: var(--text-muted); text-decoration: none; }
    </style>
</head>
<body>
    <div id="sticky-bar">
        <a href="blue.html" class="bar-back">
            <i class="fa-solid fa-arrow-left back-arrow" style="font-size:0.7rem;"></i>
            <span>BlUE</span>
        </a>
        <div class="bar-divider"></div>
        <button class="bar-nav-btn disabled" id="btn-prev"><i class="fa-solid fa-chevron-left" style="font-size:0.65rem;"></i></button>
        <button class="bar-nav-btn disabled" id="btn-next"><i class="fa-solid fa-chevron-right" style="font-size:0.65rem;"></i></button>
        <div class="bar-divider"></div>
        <button class="bar-btn" id="theme-toggle" aria-label="Toggle dark mode">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </div>

    <div id="sidebar">
        <div class="sidebar-label">Camera</div>
        <div id="sidebar-category" class="sidebar-category"></div>
    </div>

    <div id="page-wrap">
        <div id="mobile-category" class="mobile-category"></div>
        <div class="post-title" id="post-title"></div>
        <div class="post-meta" id="post-meta"></div>
        <div id="post-content"></div>
        <footer>
            <span>&copy; 2026 Jasaman Saini</span>
            <a href="index.html">Homepage</a>
        </footer>
    </div>

    <script>
    var body = document.body;
    var icon = document.getElementById('theme-icon');

    function applyTheme(dark) {
        body.classList.toggle('dark', dark);
        icon.className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }
    var stored = localStorage.getItem('theme');
    if (stored) {
        applyTheme(stored === 'dark');
    } else {
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) applyTheme(e.matches);
    });
    document.getElementById('theme-toggle').addEventListener('click', function() {
        var isDark = body.classList.toggle('dark');
        icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    var params = new URLSearchParams(window.location.search);
    var currentId = params.get('id');

    fetch('posts.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var posts = data.posts;
            var BASE  = data.base;
            var ids   = posts.map(function(p){ return p.id; });

            if (!currentId) currentId = ids[0];
            var post = posts.find(function(p){ return p.id === currentId; });
            var idx  = ids.indexOf(currentId);

            if (!post) { window.location = 'blue.html'; return; }

            document.title = escHtml(post.title || 'Post') + ' | BlUE';
            document.getElementById('post-title').textContent = post.title || '';
            var metaParts = [post.location, post.date].filter(Boolean);
            document.getElementById('post-meta').textContent = metaParts.join(' \u2014 ');

            var cat = post.category || '';
            var mobileCat  = document.getElementById('mobile-category');
            var sidebarCat = document.getElementById('sidebar-category');
            if (cat) {
                mobileCat.textContent  = cat;
                sidebarCat.textContent = cat;
            } else {
                mobileCat.style.display = 'none';
            }

            var html = '';
            for (var i = 0; i < post.count; i++) {
                var n   = String(i + 1).padStart(2, '0');
                var src = BASE + post.id + '_' + n + '.jpg';
                var cap = (post.captions && post.captions[i]) || '';
                html += '<div class="post-image">'
                    + '<img src="' + escAttr(src) + '" alt="' + escAttr(cap) + '"'
                    + (i === 0 ? ' loading="eager" fetchpriority="high"' : ' loading="lazy"')
                    + '>'
                    + (cap ? '<div class="post-image-caption">' + escHtml(cap) + '</div>' : '')
                    + '</div>';
            }
            if (post.body && post.body.length) {
                html += '<div class="post-body">';
                post.body.forEach(function(p){ if(p) html += '<p>' + escHtml(p) + '</p>'; });
                html += '</div>';
            }
            document.getElementById('post-content').innerHTML = html;

            var prevBtn = document.getElementById('btn-prev');
            var nextBtn = document.getElementById('btn-next');
            if (idx > 0) {
                prevBtn.classList.remove('disabled');
                prevBtn.addEventListener('click', function(){ window.location = 'blue-post.html?id=' + ids[idx-1]; });
            }
            if (idx < ids.length - 1) {
                nextBtn.classList.remove('disabled');
                nextBtn.addEventListener('click', function(){ window.location = 'blue-post.html?id=' + ids[idx+1]; });
            }
        })
        .catch(function() { window.location = 'blue.html'; });
    </script>
</body>
</html>
