<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
    <script>if(matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.classList.add('dark');</script>
    <title>ORO</title>
    <link rel="icon" href="/site-icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="shared.css">
    <style>
        body {
            background-color: transparent; color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
        }
        #page { max-width: 48rem; margin: 0 auto; padding: 3rem 1.5rem 0; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; margin-bottom: 3rem;
        }
        header h1 {
            font-size: 1.75rem; font-weight: 600;
            letter-spacing: 0;
            display: flex; align-items: center;
            margin: 0;
        }
        /* ── Search bar ── */
        .search-block { margin-bottom: 1.75rem; }
        .search-row { display: flex; gap: 0.5rem; align-items: center; }

        .search-pill {
            position: relative;
            flex: 1 1 auto; min-width: 0;
            display: flex; align-items: center;
            height: 2.25rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 999px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-pill:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(10,132,255,0.12);
        }
        .search-pill input {
            flex: 1 1 auto; min-width: 0; height: 100%;
            background: none; border: none; outline: none;
            padding: 0 0.75rem 0 1.1rem;
            font-size: 0.875rem; line-height: 1; font-family: inherit; color: var(--text-main);
        }
        .search-pill input::placeholder { color: var(--text-muted); }
        .pill-divider {
            width: 1px; height: 1.25rem;
            background: var(--border); flex-shrink: 0;
        }
        .pill-btn {
            flex-shrink: 0; width: 2.25rem; height: 100%;
            display: inline-flex; align-items: center; justify-content: center;
            background: none; border: none;
            color: var(--text-muted); font-size: 0.85rem;
            cursor: pointer; transition: color 0.2s;
        }
        .pill-btn:first-of-type { margin-left: 0.1rem; }
        .pill-btn:last-of-type  { margin-right: 0.3rem; }
        @media (hover: hover) and (pointer: fine) {
            .pill-btn:hover { color: var(--accent); }
        }
        .pill-btn:focus-visible { outline: none; color: var(--accent); }

        #city-select {
            position: absolute; opacity: 0; pointer-events: none;
            width: 2.25rem; height: 2.25rem;
            right: 0.3rem; top: 0;
            font-size: 16px; cursor: pointer;
            border: none; background: none;
        }

        /* Date input */
        .date-input {
            flex: 0 0 auto; height: 2.25rem;
            background: var(--card); color: var(--text-main);
            border: 1px solid var(--border); border-radius: 999px;
            padding: 0 0.78rem; font-size: 0.78rem; line-height: 1; font-family: inherit;
            outline: none; font-variant-numeric: tabular-nums;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 7.85rem;
        }
        .date-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(10,132,255,0.12);
        }
        .date-input.date-error {
            border-color: #e53e3e;
            box-shadow: 0 0 0 3px rgba(229,62,62,0.15);
        }
        .date-input::-webkit-calendar-picker-indicator {
            width: 0.9rem; height: 0.9rem; margin: 0;
            opacity: 0.5; cursor: pointer;
        }
        body.dark .date-input::-webkit-calendar-picker-indicator { filter: invert(1); }

        /* City search submit button — now only for text search */
        .btn {
            flex: 0 0 auto; height: 2.25rem;
            background: var(--accent); color: #fff;
            border: 1px solid var(--accent); border-radius: 999px;
            padding: 0 1.35rem; font-size: 0.875rem; font-weight: 500;
            line-height: 1; font-family: inherit; cursor: pointer;
            transition: filter 0.2s, transform 0.06s;
            display: inline-flex; align-items: center; gap: 0.4rem;
            white-space: nowrap;
        }
        .btn:hover { filter: brightness(1.08); }
        .btn:active { transform: translateY(1px); }
        .btn i { font-size: 0.78rem; }

        @media (max-width: 520px) {
            .btn span { display: none; }
            .btn { width: 2.25rem; padding: 0; justify-content: center; }
            .date-input { width: 6.65rem; padding: 0 0.55rem; font-size: 0.72rem; }
        }

        /* Date error toast */
        #date-toast {
            display: none;
            align-items: center; gap: 0.4rem;
            margin-top: 0.5rem;
            padding: 0.4rem 0.9rem;
            background: rgba(229,62,62,0.10);
            border: 1px solid rgba(229,62,62,0.30);
            border-radius: 999px;
            font-size: 0.75rem; color: #c53030;
            width: fit-content;
        }
        body.dark #date-toast { color: #fc8181; background: rgba(229,62,62,0.12); border-color: rgba(229,62,62,0.25); }
        #date-toast.visible { display: inline-flex; }
        #date-toast i { font-size: 0.7rem; }

        /* Summary card */
        .sun-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1.25rem; margin-bottom: 1.5rem;
        }
        .sun-location {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: var(--ls-wide); color: var(--text-muted);
            margin: 0 0 0.9rem;
        }
        .sun-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(7rem, 1fr));
            gap: 1rem 1.25rem;
        }
        .sun-item { min-width: 0; }
        .sun-label {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: var(--ls-mid); color: var(--text-muted);
            margin: 0 0 0.2rem;
            display: flex; align-items: center; gap: 0.35rem;
        }
        .sun-value { font-size: 0.95rem; font-weight: 500; font-variant-numeric: tabular-nums; }
        .sun-swatch {
            width: 0.55rem; height: 0.55rem; border-radius: 50%;
            display: inline-block; flex-shrink: 0;
        }

        /* Best window card */
        .best-window {
            background: linear-gradient(135deg, hsl(35, 90%, 60%) 0%, hsl(20, 85%, 55%) 100%);
            border-radius: var(--radius-card);
            padding: 1.1rem 1.25rem; margin-bottom: 1.5rem;
            color: #1a1207;
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.75rem; flex-wrap: nowrap;
        }
        .best-window-body { flex: 1 1 0; min-width: 0; }
        .best-window-label {
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: var(--ls-wide); font-weight: 600;
            opacity: 0.75; margin: 0 0 0.25rem;
        }
        .best-window-time {
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap;
        }
        .best-window-note { font-size: 0.8rem; opacity: 0.8; margin: 0.15rem 0 0; }
        .best-window-tz {
            font-size: 0.62rem; text-transform: uppercase;
            letter-spacing: var(--ls-mid); opacity: 0.6; margin: 0.3rem 0 0;
        }
        .best-window-score {
            flex: 0 0 auto;
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1; white-space: nowrap;
        }
        .best-window-score small { font-size: 0.75rem; opacity: 0.7; font-weight: 400; }

        /* Timeline */
        .section-title {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: var(--ls-wide); color: var(--text-muted);
            font-weight: 700; margin: 2rem 0 0.75rem;
        }
        .hour-scroll {
            display: flex; gap: 0.4rem;
            overflow-x: auto; padding-bottom: 0.75rem;
            scroll-snap-type: x proximity;
            -webkit-overflow-scrolling: touch;
        }
        .hour-scroll::-webkit-scrollbar { height: 4px; }
        .hour-scroll::-webkit-scrollbar-thumb { background: var(--timeline); border-radius: 2px; }
        .hour-card {
            flex: 0 0 auto; width: 4.25rem;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 0.6rem; padding: 0.6rem 0.4rem 0.55rem;
            text-align: center; scroll-snap-align: start; position: relative;
        }
        .hour-card.now { border-color: var(--accent); box-shadow: inset 0 0 0 100px rgba(10,132,255,0.06); }
        .hour-card.now .hour-time { color: var(--accent); font-weight: 600; }
        .hour-time { font-size: 0.72rem; color: var(--text-muted); font-variant-numeric: tabular-nums; margin-bottom: 0.35rem; }
        .hour-swatch { width: 100%; height: 1.6rem; border-radius: 0.3rem; margin-bottom: 0.4rem; }
        .hour-score { font-size: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1; }
        .hour-score small { font-size: 0.6rem; font-weight: 400; color: var(--text-muted); }
        .hour-cloud { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.25rem; display: flex; align-items: center; justify-content: center; gap: 0.2rem; }

        /* 7-day strip */
        .day-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.35rem; }
        .day-cell {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 0.6rem; padding: 0.6rem 0.3rem;
            text-align: center; min-width: 0; cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            font-family: inherit; color: inherit;
            -webkit-appearance: none; appearance: none;
        }
        .day-cell:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .day-cell.selected { border-color: var(--accent); box-shadow: inset 0 0 0 100px rgba(10,132,255,0.06); }
        .day-cell.selected .day-name { color: var(--accent); }
        @media (hover: hover) and (pointer: fine) { .day-cell:hover { background: var(--card-hover); } }

        .local-time-note { font-size: 0.65rem; color: var(--text-muted); letter-spacing: var(--ls-mid); text-transform: uppercase; margin: 0.6rem 0 0; }
        .day-name { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--ls-mid); margin-bottom: 0.35rem; }
        .day-bar { height: 0.4rem; border-radius: 999px; background: var(--timeline); overflow: hidden; margin: 0.4rem 0 0.35rem; }
        .day-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, hsl(220,70%,55%) 0%, hsl(35,90%,60%) 100%); }
        .day-score { font-size: 0.8rem; font-weight: 500; font-variant-numeric: tabular-nums; }
        .day-times { font-size: 0.6rem; color: var(--text-muted); margin-top: 0.2rem; font-variant-numeric: tabular-nums; }

        /* Status */
        .status { padding: 2rem 1rem; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
        .status i { display: block; font-size: 1.3rem; margin-bottom: 0.6rem; opacity: 0.5; }
        .hidden { display: none !important; }
        .status-retry {
            display: inline-flex; align-items: center; gap: 0.4rem;
            margin-top: 0.85rem; background: none; border: 1px solid var(--border);
            border-radius: 999px; padding: 0.4rem 1rem;
            font-family: inherit; font-size: 0.78rem; font-weight: 500;
            color: var(--text-muted); cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .status-retry:hover { color: var(--accent); border-color: rgba(10,132,255,0.45); }
        .status-retry:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .status-retry i { display: inline; font-size: 0.72rem; margin-bottom: 0; opacity: 1; }

        /* Skeleton */
        .skeleton { background: var(--card); border-radius: var(--radius-card); animation: pulse 1.4s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        footer {
            padding: 1.5rem 0; margin-top: 3rem;
            border-top: 1px solid var(--timeline);
            display: flex; justify-content: space-between;
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: var(--ls-wide); color: var(--text-muted);
        }
        footer a { text-decoration: none; }

        @media (max-width: 520px) {
            .day-strip { grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 0.25rem; }
            .day-cell { padding: 0.5rem 0.2rem; }
            .day-times { font-size: 0.55rem; }
        }
        @media (prefers-reduced-motion: reduce) { .skeleton { animation: none; } }
    </style>
</head>
<body class="page-with-gallery-link page-oro">
    <div id="page">
        <header>
            <h1><span class="icon-globe">&#127774;</span>ORO</h1>
            <a href="blue.html" class="gallery-link nav-pill" aria-label="Open Blue gallery">
                <i class="fa-regular fa-images"></i>Gallery
            </a>
        </header>

        <form class="search-block" id="search-form" autocomplete="off">
            <div class="search-row">
                <div class="search-pill">
                    <input
                        type="text" id="city-input"
                        placeholder="Search a city&hellip;" aria-label="City"
                    >
                    <span class="pill-divider" aria-hidden="true"></span>
                    <button type="button" class="pill-btn" id="geo-btn"
                        aria-label="Use my location" title="Use my location">
                        <i class="fa-solid fa-location-crosshairs"></i>
                    </button>
                    <button type="button" class="pill-btn" id="popular-btn"
                        aria-label="Popular cities" title="Popular cities">
                        <i class="fa-solid fa-list"></i>
                    </button>
                    <select id="city-select" aria-label="Popular cities" tabindex="-1">
                        <option value="">— pick a city —</option>
                    </select>
                </div>

                <input
                    type="date" class="date-input" id="date-input"
                    aria-label="Date"
                >

                <button type="submit" class="btn" id="search-btn" aria-label="Search city">
                    <i class="fa-solid fa-magnifying-glass"></i><span>Search</span>
                </button>
            </div>
            <div id="date-toast" role="alert" aria-live="polite">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="date-toast-msg">Date out of range</span>
            </div>
        </form>

        <div id="content"></div>
        <div id="status" class="status hidden"></div>

        <footer>
            <span>&copy; <span id="copy-year"></span> Jasaman Saini</span>
            <a href="index.html">Homepage</a>
        </footer>
    </div>

    <script src="theme.js"></script>
    <script src="cloudflare-analytics-config.js"></script>
    <script src="cloudflare-analytics.js"></script>
    <script src="oro.js"></script>
</body>
</html>
