<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="g"><circle cx="16" cy="16" r="14"/></clipPath>
    <radialGradient id="sh" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".18"/>
    </radialGradient>
  </defs>
  <!-- Ocean -->
  <circle cx="16" cy="16" r="14" fill="#2563c8"/>
  <!-- Land masses (clip to circle) -->
  <g clip-path="url(#g)">
    <!-- Europe / Africa -->
    <path d="M16 4 Q20 4 22 7 Q24 10 23 14 Q24 18 22 22 Q20 27 16 28 Q13 28 12 24 Q10 20 11 16 Q10 12 12 8 Z" fill="#4a8c4a"/>
    <!-- Americas -->
    <path d="M2 6 Q5 4 7 8 Q9 12 8 18 Q7 24 5 27 Q3 24 2 18 Z" fill="#4a8c4a"/>
    <!-- Asia -->
    <path d="M22 4 Q27 5 30 10 Q32 14 30 18 Q28 14 26 12 Q24 9 22 8 Z" fill="#4a8c4a"/>
    <!-- Grid lines -->
    <g fill="none" stroke="#fff" stroke-opacity=".22" stroke-width=".7">
      <!-- Longitude ellipses -->
      <ellipse cx="16" cy="16" rx="5"  ry="14"/>
      <ellipse cx="16" cy="16" rx="10" ry="14"/>
      <!-- Latitude ellipses -->
      <ellipse cx="16" cy="16" rx="14" ry="4.5"/>
      <ellipse cx="16" cy="16" rx="14" ry="9"/>
      <!-- Centre lines -->
      <line x1="2" y1="16" x2="30" y2="16"/>
      <line x1="16" y1="2" x2="16" y2="30"/>
    </g>
    <!-- Shading overlay -->
    <circle cx="16" cy="16" r="14" fill="url(#sh)"/>
  </g>
  <!-- Border -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#1a40a0" stroke-width="1.2"/>
</svg>
