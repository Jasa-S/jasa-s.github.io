<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
    <script>(function(){try{var t=localStorage.getItem('theme'),d=t?t==='dark':matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
    <title>CUSP</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" sizes="180x180" href="/blue-images/profileImage.png?v=2">
    <link rel="manifest" href="/cusp.webmanifest">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="shared.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
        }
        #page { max-width: 48rem; margin: 0 auto; padding: 3rem 1.5rem 0; }
        header { margin-bottom: 1.75rem; }
        header h1 {
            font-size: 1.75rem; font-weight: 600;
            letter-spacing: -0.025em;
            display: flex; align-items: center;
            margin: 0;
        }
        header h1 .hg { font-size: 1.5rem; line-height: 1; }
        header .sub {
            font-size: 0.8125rem; color: var(--text-muted);
            margin: 0.4rem 0 0; letter-spacing: var(--ls-mid);
            text-transform: lowercase;
        }

        /* Add-milestone form */
        .add-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1rem 1.1rem;
            margin-bottom: 1.75rem;
        }
        .add-grid {
            display: grid; gap: 0.65rem;
            grid-template-columns: 1fr;
        }
        @media (min-width: 560px) {
            .add-grid { grid-template-columns: 1fr 1fr auto auto auto auto; align-items: center; }
        }
        .add-recur {
            padding: 0 2rem 0 0.95rem; -webkit-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0 0l5 6 5-6z' fill='%23999'/></svg>");
            background-repeat: no-repeat; background-position: right 0.7rem center;
            cursor: pointer;
        }
        .add-input {
            background: var(--bg); color: var(--text-main);
            border: 1px solid var(--border); border-radius: 999px;
            padding: 0 0.95rem; font-size: 0.9rem;
            height: 2.4rem; line-height: 1;
            font-family: inherit; outline: none;
            transition: border-color 0.2s;
            min-width: 0;
        }
        .add-input:focus { border-color: var(--cosmic-purple); }
        body.dark .add-input::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; }
        .add-emoji { width: 3.4rem; text-align: center; padding: 0; }
        .add-color {
            width: 2.4rem; height: 2.4rem;
            padding: 0; border: 1px solid var(--border);
            border-radius: 999px; background: transparent;
            cursor: pointer; overflow: hidden;
        }
        .add-color::-webkit-color-swatch-wrapper { padding: 0; }
        .add-color::-webkit-color-swatch { border: none; border-radius: 999px; }
        .add-color::-moz-color-swatch { border: none; border-radius: 999px; }
        .add-error {
            color: #dc2626; font-size: 0.75rem; margin: 0.4rem 0 0;
            min-height: 0.95rem;
        }
        body.dark .add-error { color: #fca5a5; }

        /* Button (mirrors oro.html .btn) */
        .btn {
            background: var(--card); color: var(--text-main);
            border: 1px solid var(--border); border-radius: 999px;
            padding: 0 0.95rem; font-size: 0.8rem;
            height: 2.4rem; line-height: 1;
            font-family: inherit; cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            display: inline-flex; align-items: center; gap: 0.4rem;
            white-space: nowrap;
        }
        .btn:hover { background: var(--card-hover); border-color: rgba(125,125,125,0.3); }
        .btn i { font-size: 0.75rem; }

        /* Milestone card */
        .m-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--cosmic-purple);
            border-radius: var(--radius-card);
            padding: 1rem 1.15rem;
            margin-bottom: 0.85rem;
            transition: border-color 0.2s, background 0.2s;
        }
        .m-card.reached { opacity: 0.78; }
        .m-head {
            display: flex; align-items: flex-start; gap: 0.75rem;
            justify-content: space-between;
        }
        .m-title-wrap {
            display: flex; align-items: center; gap: 0.55rem;
            min-width: 0; flex: 1 1 auto;
        }
        .m-emoji {
            font-size: 1.15rem; line-height: 1; flex-shrink: 0;
        }
        .m-title {
            font-size: 0.95rem; font-weight: 600;
            margin: 0; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap;
        }
        .m-actions {
            display: flex; gap: 0.15rem; flex-shrink: 0;
        }
        .icon-btn {
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 0.8rem;
            padding: 0.35rem 0.45rem; border-radius: 999px;
            transition: color 0.2s, background 0.2s;
            line-height: 1;
        }
        .icon-btn:hover { color: var(--cosmic-purple); background: var(--card-hover); }
        .icon-btn.active { color: var(--cosmic-purple); }
        .m-target {
            font-size: 0.7rem; color: var(--text-muted);
            letter-spacing: var(--ls-mid); text-transform: uppercase;
            margin: 0.55rem 0 0.55rem;
        }
        .m-count {
            display: flex; align-items: baseline; gap: 0.35rem;
            font-variant-numeric: tabular-nums;
            margin: 0.1rem 0 0.85rem;
        }
        .m-count .seg {
            display: inline-flex; align-items: baseline; gap: 0.2rem;
        }
        .m-count .num {
            font-size: 1.5rem; font-weight: 600;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }
        .m-count .lbl {
            font-size: 0.65rem; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: var(--ls-mid);
        }
        .m-count .sep {
            color: var(--text-muted); font-size: 1rem; margin: 0 0.05rem;
            opacity: 0.5;
        }
        .m-count.reached-text {
            font-size: 0.95rem; font-weight: 600;
            color: var(--cosmic-purple);
        }
        .m-bar {
            height: 4px; background: var(--timeline);
            border-radius: 999px; overflow: hidden;
            margin-bottom: 0.1rem;
        }
        .m-bar-fill {
            height: 100%; width: 0%;
            background: var(--cosmic-purple);
            transition: width 0.5s ease;
            border-radius: 999px;
        }
        .m-meta {
            display: flex; justify-content: space-between;
            font-size: 0.65rem; color: var(--text-muted);
            margin-top: 0.4rem;
            letter-spacing: var(--ls-mid); text-transform: uppercase;
        }

        /* Inline edit form */
        .edit-form {
            display: none;
            margin-top: 0.85rem;
            padding-top: 0.85rem;
            border-top: 1px dashed var(--border);
            gap: 0.55rem;
            flex-wrap: wrap;
        }
        .edit-form.open { display: flex; }
        .edit-form .add-input { flex: 1 1 8rem; }

        /* Section heading override */
        .cusp-heading {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: var(--ls-wide); color: var(--text-muted);
            font-weight: 700; margin: 0 0 0.85rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .cusp-heading .count-pill {
            font-size: 0.65rem; padding: 0.05rem 0.5rem;
            border: 1px solid var(--border); border-radius: 999px;
            color: var(--text-muted); letter-spacing: var(--ls-mid);
        }
        section.cusp-section { margin-bottom: 2rem; }

        /* Empty state */
        .empty {
            text-align: center; padding: 2.5rem 1rem;
            color: var(--text-muted);
        }
        .empty i { font-size: 1.75rem; margin-bottom: 0.85rem; opacity: 0.5; }
        .empty p { margin: 0; font-size: 0.9rem; }
        .empty .hint { font-size: 0.75rem; margin-top: 0.4rem; opacity: 0.7; }

        /* Reached collapsible */
        details.reached-wrap > summary {
            list-style: none; cursor: pointer;
            user-select: none;
        }
        details.reached-wrap > summary::-webkit-details-marker { display: none; }
        details.reached-wrap > summary .chev {
            margin-left: auto; transition: transform 0.2s;
            font-size: 0.7rem; opacity: 0.6;
        }
        details.reached-wrap[open] > summary .chev { transform: rotate(90deg); }

        footer {
            padding: 1.5rem 0;
            margin-top: 2.5rem;
            border-top: 1px solid var(--timeline);
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-muted); font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: var(--ls-wide);
        }
        footer a { text-decoration: none; }
        footer a:hover { color: var(--cosmic-purple); }

        /* Share-preview banner */
        #share-preview {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--cosmic-purple);
            border-radius: var(--radius-card);
            padding: 0.95rem 1.15rem;
            margin-bottom: 1.5rem;
            display: flex; flex-direction: column; gap: 0.6rem;
        }
        #share-preview .sp-label {
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: var(--ls-wide); color: var(--text-muted);
            font-weight: 700;
        }
        #share-preview .sp-title {
            font-size: 1rem; font-weight: 600; margin: 0;
            display: flex; align-items: center; gap: 0.5rem;
        }
        #share-preview .sp-target {
            font-size: 0.8rem; color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
        #share-preview .sp-actions {
            display: flex; gap: 0.5rem; flex-wrap: wrap;
        }

        /* Recurring badge in card meta */
        .m-recur-badge {
            color: var(--cosmic-purple);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: var(--ls-mid);
            display: inline-flex; align-items: center; gap: 0.3rem;
        }
        .m-recur-badge i { font-size: 0.7rem; }

        /* Pin active state: angled thumbtack */
        .icon-btn.js-pin.active i { transform: rotate(-30deg); }
        .icon-btn.js-pin.active { color: var(--cosmic-purple); }
        .m-card.pinned { box-shadow: 0 0 0 1px rgba(124,58,237,0.18); }

        /* Drag & drop visuals */
        .m-card[draggable="true"] { cursor: grab; }
        .m-card[draggable="true"]:active { cursor: grabbing; }
        .m-card.dragging { opacity: 0.4; }
        .m-card.drop-before { box-shadow: 0 -2px 0 0 var(--cosmic-purple); }
        .m-card.drop-after  { box-shadow: 0  2px 0 0 var(--cosmic-purple); }

        /* Sort-reset pill in the heading */
        .sort-reset {
            margin-left: auto;
            background: var(--card); color: var(--text-muted);
            border: 1px solid var(--border); border-radius: 999px;
            padding: 0.2rem 0.65rem; font-size: 0.65rem;
            font-family: inherit; cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.35rem;
            text-transform: uppercase; letter-spacing: var(--ls-mid);
            transition: color 0.2s, border-color 0.2s;
        }
        .sort-reset i { font-size: 0.7rem; }
        .sort-reset:hover { color: var(--cosmic-purple); border-color: rgba(124,58,237,0.4); }

        /* Overflow menu panel */
        #menu-panel {
            position: fixed; top: 3rem; right: 1rem;
            min-width: 12rem; z-index: 600;
            background: var(--card); color: var(--text-main);
            border: 1px solid var(--border); border-radius: 0.6rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            padding: 0.3rem; display: flex; flex-direction: column;
            opacity: 0; transform: translateY(-4px);
            transition: opacity 0.15s, transform 0.15s;
            pointer-events: none;
        }
        #menu-panel.show {
            opacity: 1; transform: translateY(0);
            pointer-events: auto;
        }
        body.dark #menu-panel { box-shadow: 0 8px 24px rgba(0,0,0,0.55); }
        #menu-panel button {
            background: none; border: none; cursor: pointer;
            color: var(--text-main); font-family: inherit;
            font-size: 0.85rem; text-align: left;
            padding: 0.55rem 0.75rem; border-radius: 0.35rem;
            display: flex; align-items: center; gap: 0.6rem;
            line-height: 1.2;
        }
        #menu-panel button:hover { background: var(--card-hover); }
        #menu-panel button i {
            color: var(--text-muted); font-size: 0.85rem;
            width: 1rem; text-align: center;
        }
        #menu-panel button:hover i { color: var(--cosmic-purple); }

        /* Toast for undo */
        #toast {
            position: fixed; left: 50%; bottom: 1.25rem;
            transform: translateX(-50%) translateY(1rem);
            background: var(--card); color: var(--text-main);
            border: 1px solid var(--border); border-radius: 999px;
            padding: 0.55rem 0.85rem 0.55rem 1.1rem;
            display: flex; align-items: center; gap: 0.85rem;
            font-size: 0.85rem; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 1000; max-width: calc(100vw - 2rem);
        }
        #toast.show {
            opacity: 1; transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        body.dark #toast { box-shadow: 0 8px 24px rgba(0,0,0,0.55); }
        .toast-action {
            background: none; border: none;
            color: var(--cosmic-purple); cursor: pointer;
            font-family: inherit; font-size: 0.85rem;
            font-weight: 600; padding: 0.15rem 0.5rem;
            border-radius: 999px;
        }
        .toast-action:hover { background: rgba(124,58,237,0.12); }

        /* Keyboard hint chip */
        .empty kbd {
            display: inline-block;
            padding: 0.05rem 0.4rem;
            font-family: inherit; font-size: 0.75rem;
            background: var(--card); color: var(--text-muted);
            border: 1px solid var(--border); border-radius: 0.35rem;
            line-height: 1;
        }

        @media (max-width: 520px) {
            #page { padding: 2.5rem 1rem 0; }
            header h1 { font-size: 1.5rem; }
            .m-count .num { font-size: 1.25rem; }
            .add-emoji { width: 100%; }
            .add-color { width: 100%; height: 2.4rem; }
            .icon-btn { min-width: 2.4rem; min-height: 2.4rem; padding: 0.55rem; font-size: 0.9rem; }
            .m-actions { gap: 0.25rem; }
            .sort-reset span { display: none; }
            .sort-reset { padding: 0.3rem 0.5rem; }
        }
    </style>
</head>
<body>
    <div id="top-bar-direct">
        <button class="top-btn" id="menu-btn" aria-label="More actions"
            aria-haspopup="menu" aria-expanded="false">
            <i class="fa-solid fa-ellipsis"></i>
        </button>
        <button class="top-btn" id="theme-toggle" aria-label="Toggle dark mode">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </div>

    <div id="menu-panel" role="menu" aria-labelledby="menu-btn" hidden>
        <button type="button" role="menuitem" id="menu-export-json">
            <i class="fa-solid fa-file-arrow-down"></i><span>Export JSON</span>
        </button>
        <button type="button" role="menuitem" id="menu-import-json">
            <i class="fa-solid fa-file-arrow-up"></i><span>Import JSON</span>
        </button>
        <button type="button" role="menuitem" id="menu-export-ical">
            <i class="fa-solid fa-calendar-plus"></i><span>Export iCal (.ics)</span>
        </button>
    </div>
    <input type="file" id="import-file-input" accept=".json,application/json" hidden>

    <div id="page">
        <header>
            <h1><span class="icon-globe hg" aria-hidden="true">⏳</span>CUSP</h1>
            <p class="sub">milestones &middot; countdowns</p>
        </header>

        <form class="add-card" id="add-form" autocomplete="off">
            <div class="add-grid">
                <input type="text" class="add-input" id="add-title"
                    placeholder="Milestone (e.g. Trip to Tokyo)"
                    aria-label="Milestone title" maxlength="80">
                <input type="datetime-local" class="add-input" id="add-when"
                    aria-label="Target date and time">
                <input type="text" class="add-input add-emoji" id="add-emoji"
                    placeholder="🎯" aria-label="Emoji" maxlength="4">
                <input type="color" class="add-color" id="add-color"
                    value="#7C3AED" aria-label="Accent color">
                <select class="add-input add-recur" id="add-recur" aria-label="Repeat">
                    <option value="">No repeat</option>
                    <option value="daily">↻ Daily</option>
                    <option value="weekly">↻ Weekly</option>
                    <option value="monthly">↻ Monthly</option>
                    <option value="yearly">↻ Yearly</option>
                </select>
                <button type="submit" class="btn" id="add-btn">
                    <i class="fa-solid fa-plus"></i>Add
                </button>
            </div>
            <p class="add-error" id="add-error" aria-live="polite"></p>
        </form>

        <div id="share-preview" hidden></div>

        <section class="cusp-section" id="upcoming-section" hidden>
            <h2 class="cusp-heading">
                <span>Upcoming</span>
                <span class="count-pill" id="upcoming-count">0</span>
                <button type="button" id="sort-reset" class="sort-reset" hidden
                    title="Reset to date order">
                    <i class="fa-solid fa-arrow-down-1-9"></i>
                    <span>Reset to date order</span>
                </button>
            </h2>
            <div id="upcoming-list"></div>
        </section>

        <section class="cusp-section" id="reached-section" hidden>
            <details class="reached-wrap">
                <summary>
                    <h2 class="cusp-heading" style="margin-bottom:0;">
                        <span>Reached</span>
                        <span class="count-pill" id="reached-count">0</span>
                        <i class="fa-solid fa-chevron-right chev"></i>
                    </h2>
                </summary>
                <div id="reached-list" style="margin-top:0.85rem;"></div>
            </details>
        </section>

        <div id="empty-state" class="empty" hidden>
            <i class="fa-solid fa-hourglass-half"></i>
            <p>No milestones yet.</p>
            <p class="hint">Add one above to start a countdown — or press <kbd>n</kbd>.</p>
        </div>

        <div id="toast" role="status" aria-live="polite"></div>

        <footer>
            <span>&copy; <span id="copy-year"></span> Jasaman Saini</span>
            <a href="index.html">Homepage</a>
        </footer>
    </div>

    <script src="theme.js"></script>
    <script src="cusp.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js').catch(function () {});
            });
        }
    </script>
</body>
</html>
