name: quant-signals

on:
  schedule:
    # 22:30 UTC weekdays — about an hour after US market close.
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: quant-signals
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: quant/requirements.txt

      - name: Install dependencies
        run: pip install -r quant/requirements.txt

      - name: Run tests
        run: pytest quant/tests -q

      - name: Generate signals
        run: |
          python -m quant.src.main \
            --config quant/config/universe.yml \
            --out quant/output/signals.json \
            --cache quant/cache

      - name: Validate JSON schema
        run: |
          python -c "
          import json, sys
          from jsonschema import validate
          schema = json.load(open('quant/schema/signals.schema.json'))
          payload = json.load(open('quant/output/signals.json'))
          validate(payload, schema)
          print('schema OK')
          "

      - name: Commit signals if changed
        run: |
          if [ ! -f quant/output/signals.json ]; then
            echo "signals.json was not produced; skipping commit"
            exit 0
          fi
          git config user.name  "quant-bot"
          git config user.email "quant-bot@users.noreply.github.com"
          git add quant/output/signals.json quant/output/history/
          if git diff --cached --quiet; then
            echo "No signal changes."
          else
            git commit -m "chore(quant): refresh signals $(date -u +%FT%TZ)"
            git push
          fi

      - name: Open issue on data errors
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f quant/output/signals.json ]; then
            echo "no signals.json produced; skipping issue check"
            exit 0
          fi
          n=$(python -c "import json; print(len(json.load(open('quant/output/signals.json')).get('errors', [])))")
          if [ "$n" -eq 0 ]; then
            echo "no errors"
            exit 0
          fi
          today=$(date -u +%F)
          title="quant-signals: $n data errors on $today"
          # Skip if an open issue already exists for today.
          existing=$(gh issue list --state open --search "in:title \"quant-signals\" \"$today\"" --json number --jq 'length' || echo 0)
          if [ "$existing" != "0" ]; then
            echo "issue for today already open; skipping"
            exit 0
          fi
          body=$(python -c "import json; print(json.dumps(json.load(open('quant/output/signals.json'))['errors'], indent=2))")
          gh issue create \
            --title "$title" \
            --body "$(printf '## Errors from quant-signals run\n\n```json\n%s\n```\n' "$body")" \
            || echo "issue creation failed; continuing"
