<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var t=localStorage.getItem('theme'),d=t?t==='dark':matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
    <title>Stroll</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="shared.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            margin: 0;
            padding: 3rem 1.25rem 4rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .wrap { max-width: 72rem; margin: 0 auto; }

        .top-bar {
            position: absolute;
            top: 0.75rem;
            right: 1.25rem;
            display: flex;
            align-items: center;
            z-index: 500;
        }
        .top-bar .top-btn { padding: 0.35rem; min-width: unset; }
        @media (hover: hover) and (pointer: fine) {
            #view-toggle:hover { color: var(--cosmic-purple); }
            #theme-toggle:hover { color: var(--cosmic-purple); transform: rotate(20deg) scale(1.2); }
        }

        .slow-walking-header { margin-bottom: 1.75rem; }
        .slow-walking-title {
            font-size: 1.75rem; font-weight: 600;
            letter-spacing: -0.025em; margin: 0;
            display: flex; align-items: center; gap: 0.6rem;
        }

        /* Now Playing */
        .now-playing {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 760px) { .now-playing { grid-template-columns: 1fr; } }

        .video-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
        }
        .video-box .placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.875rem;
            text-align: center;
            padding: 1rem;
        }
        #yt-walk { width: 100%; height: 100%; border: 0; display: block; }

        /* Cinema view */
        .view-cinema .now-playing { grid-template-columns: 1fr; }
        .view-cinema .controls-card {
            flex-direction: row;
            align-items: center;
            padding: 0.65rem 1rem;
            gap: 1.25rem;
        }
        .view-cinema .now-meta {
            flex: 1;
            min-height: unset;
            flex-direction: row;
            align-items: center;
            gap: 0.35rem;
            overflow: hidden;
        }
        .view-cinema .now-walk-name {
            font-size: 0.82rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .view-cinema .now-track-name::before { content: '·'; margin-right: 0.35rem; }
        .view-cinema .vol-text,
        .view-cinema .vol-val { display: none; }
        .view-cinema .vol-row { gap: 0.4rem; }
        .view-cinema input[type="range"] { width: 72px; }
        .music-hidden {
            position: absolute;
            width: 200px; height: 200px;
            opacity: 0; pointer-events: none;
            left: -9999px;
            top: -9999px;
        }
        #yt-music { width: 100%; height: 100%; border: 0; display: block; }

        .controls-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1.1rem 1.1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }
        .now-meta { display: flex; flex-direction: column; gap: 0.25rem; min-height: 2.6rem; }
        .now-walk-name { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
        .now-track-name {
            font-size: 0.8125rem; color: var(--text-muted);
            display: flex; align-items: center; gap: 0.4rem;
        }
        .now-track-name i { font-size: 0.7rem; }
        .now-empty { font-size: 0.8125rem; color: var(--text-muted); font-style: italic; }

        .play-row { display: flex; align-items: center; gap: 0.75rem; }
        .play-btn {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            border-radius: 999px;
            width: 3rem; height: 3rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, opacity 0.2s;
        }
        .play-btn:hover:not(:disabled) { transform: scale(1.05); }
        .play-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .save-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.5rem 0.85rem;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s, border-color 0.2s;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .save-btn:hover:not(:disabled) { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }
        .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .vol-row {
            display: grid;
            grid-template-columns: 1rem auto 1fr auto;
            align-items: center;
            gap: 0.5rem;
        }
        .vol-icon { color: var(--text-muted); font-size: 0.75rem; text-align: center; }
        .vol-text {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: var(--ls-mid); color: var(--text-muted); white-space: nowrap;
        }
        .vol-val { font-size: 0.7rem; color: var(--text-muted); min-width: 1.5rem; text-align: right; }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            background: var(--border);
            border-radius: 999px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px; height: 14px;
            background: var(--cosmic-purple);
            border-radius: 50%;
            border: none;
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px; height: 14px;
            background: var(--cosmic-purple);
            border-radius: 50%;
            border: none;
        }

        /* Decks */
        .decks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }
        @media (max-width: 760px) { .decks { grid-template-columns: 1fr; } }

        .deck {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1rem;
            display: flex; flex-direction: column;
        }
        .deck-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        .deck-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: var(--ls-wide);
            color: var(--text-muted);
            font-weight: 700;
            margin: 0;
        }
        .add-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.25rem 0.65rem;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s, border-color 0.2s;
        }
        .add-btn:hover { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }

        .filter-row {
            display: flex; flex-wrap: wrap; gap: 0.35rem;
            margin-bottom: 0.6rem;
        }
        .filter-pill {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .filter-pill.active {
            background: var(--text-main);
            color: var(--bg);
            border-color: var(--text-main);
        }

        .deck-list {
            display: flex; flex-direction: column;
            gap: 0.4rem;
            max-height: 26rem;
            overflow-y: auto;
            padding-right: 0.25rem;
        }
        .deck-list::-webkit-scrollbar { width: 6px; }
        .deck-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

        .item {
            display: flex; align-items: center; gap: 0.65rem;
            padding: 0.55rem 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }
        .item:hover { background: var(--card-hover); }
        .item.active {
            background: var(--card-hover);
            border-color: var(--cosmic-purple);
        }
        .item-thumb {
            width: 56px; height: 36px;
            background: #000 center/cover no-repeat;
            border-radius: 0.3rem;
            flex-shrink: 0;
            position: relative;
        }
        .item-thumb.no-img {
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.7rem;
        }
        .item-meta { flex: 1; min-width: 0; }
        .item-name {
            font-size: 0.825rem;
            font-weight: 500;
            line-height: 1.25;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-tags {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-del {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.7rem; cursor: pointer;
            opacity: 0; transition: opacity 0.15s, color 0.15s;
            padding: 0.25rem;
        }
        .item:hover .item-del { opacity: 0.7; }
        .item-del:hover { color: #dc2626; opacity: 1; }

        /* Pairings */
        .pairings {
            margin-bottom: 1.5rem;
        }
        .pair-list {
            display: flex; gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .pair-list::-webkit-scrollbar { height: 6px; }
        .pair-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
        .pair-card {
            flex-shrink: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.6rem;
            padding: 0.6rem 0.85rem;
            cursor: pointer;
            min-width: 14rem;
            transition: border-color 0.2s, transform 0.2s;
            position: relative;
        }
        .pair-card:hover { border-color: var(--cosmic-purple); transform: translateY(-2px); }
        .pair-name { font-size: 0.8rem; font-weight: 600; }
        .pair-detail {
            font-size: 0.7rem; color: var(--text-muted);
            margin-top: 0.2rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .pair-del {
            position: absolute; top: 0.3rem; right: 0.3rem;
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; opacity: 0; transition: opacity 0.15s;
            font-size: 0.7rem; padding: 0.2rem;
        }
        .pair-card:hover .pair-del { opacity: 0.6; }
        .pair-del:hover { color: #dc2626; opacity: 1; }
        .pair-empty {
            font-size: 0.8125rem;
            color: var(--text-muted);
            font-style: italic;
            padding: 0.5rem 0;
        }

        /* Add modal */
        .modal-bg {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-bg.show { display: flex; }
        .modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1.5rem;
            max-width: 28rem; width: 100%;
        }
        .modal h3 {
            margin: 0 0 1rem;
            font-size: 1rem; font-weight: 600;
        }
        .modal label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: var(--ls-mid);
            color: var(--text-muted);
            margin-bottom: 0.35rem;
            margin-top: 0.85rem;
        }
        .modal input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 0.4rem;
            padding: 0.55rem 0.7rem;
            font-size: 0.875rem;
            font-family: inherit;
            outline: none;
        }
        .modal input:focus { border-color: var(--cosmic-purple); }
        .modal-actions {
            display: flex; gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.25rem;
        }
        .btn-primary, .btn-ghost {
            border-radius: 999px;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: var(--text-main);
            color: var(--bg);
        }
        .btn-ghost {
            background: none;
            color: var(--text-muted);
            border-color: var(--border);
        }
        .btn-ghost:hover { color: var(--text-main); }
        .modal-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 0.5rem 0 0;
            line-height: 1.45;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button id="view-toggle" class="top-btn" aria-label="Toggle cinema view">
            <i id="view-icon" class="fa-solid fa-expand"></i>
        </button>
        <button id="theme-toggle" class="top-btn" aria-label="Toggle dark mode">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </div>

    <div class="wrap">
        <header class="slow-walking-header">
            <h1 class="slow-walking-title">
                &#127747; Stroll
            </h1>
        </header>

        <div class="now-playing">
            <div class="video-box">
                <div id="video-placeholder" class="placeholder">Pick a walk to begin</div>
                <div id="yt-walk"></div>
            </div>

            <div class="controls-card">
                <div class="now-meta">
                    <div id="now-walk" class="now-walk-name now-empty">No walk selected</div>
                    <div id="now-track" class="now-track-name now-empty">No track selected</div>
                </div>

                <div class="play-row">
                    <button id="play-btn" class="play-btn" aria-label="Play / pause" disabled>
                        <i class="fa-solid fa-play"></i>
                    </button>
                    <button id="save-btn" class="save-btn" disabled>
                        <i class="fa-regular fa-bookmark"></i> Save pair
                    </button>
                </div>

                <div class="vol-row">
                    <i class="vol-icon fa-solid fa-music"></i>
                    <span class="vol-text">Music</span>
                    <input id="music-vol" type="range" min="0" max="100" value="70">
                    <span id="music-vol-val" class="vol-val">70</span>
                </div>

                <div class="vol-row">
                    <i class="vol-icon fa-solid fa-city"></i>
                    <span class="vol-text">City</span>
                    <input id="city-vol" type="range" min="0" max="100" value="15">
                    <span id="city-vol-val" class="vol-val">15</span>
                </div>
            </div>
        </div>

        <section class="pairings">
            <div class="deck-head" style="margin-bottom: 0.5rem;">
                <h2 class="deck-title">Saved pairings</h2>
            </div>
            <div id="pair-list" class="pair-list"></div>
        </section>

        <div class="decks">
            <div class="deck">
                <div class="deck-head">
                    <h2 class="deck-title"><i class="fa-solid fa-person-walking" style="margin-right:0.4rem;"></i>Walks</h2>
                    <button class="add-btn" data-add="walk"><i class="fa-solid fa-plus"></i> Add</button>
                </div>
                <div id="walk-filters" class="filter-row"></div>
                <div id="walk-list" class="deck-list"></div>
            </div>

            <div class="deck">
                <div class="deck-head">
                    <h2 class="deck-title"><i class="fa-solid fa-music" style="margin-right:0.4rem;"></i>Music</h2>
                    <button class="add-btn" data-add="track"><i class="fa-solid fa-plus"></i> Add</button>
                </div>
                <div id="track-filters" class="filter-row"></div>
                <div id="track-list" class="deck-list"></div>
            </div>
        </div>
    </div>

    <div class="music-hidden"><div id="yt-music"></div></div>

    <div id="modal-bg" class="modal-bg">
        <div class="modal">
            <h3 id="modal-title">Add</h3>
            <label for="modal-url">YouTube URL or video ID</label>
            <input id="modal-url" type="text" placeholder="https://www.youtube.com/watch?v=...">
            <label for="modal-name">Name</label>
            <input id="modal-name" type="text" placeholder="e.g. Hongdae, rainy Sunday">
            <label for="modal-tags">Tags (comma-separated)</label>
            <input id="modal-tags" type="text" placeholder="hongdae, night, rain">
            <p class="modal-hint">Tag walks by neighbourhood (<code>hongdae</code>, <code>gangnam</code>) and vibe (<code>night</code>, <code>rain</code>). Tag music by artist or mood so filters group naturally.</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-ghost">Cancel</button>
                <button id="modal-save" class="btn-primary">Add</button>
            </div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="slow-walking.js"></script>
</body>
</html>
