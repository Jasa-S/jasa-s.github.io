<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var t=localStorage.getItem('theme'),d=t?t==='dark':matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
    <title>Slow Walking</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Slow Walking">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="shared.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            margin: 0;
            padding: 3rem 1.25rem 4rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .wrap { max-width: 72rem; margin: 0 auto; }

        body.dragging::after {
            content: 'Drop a YouTube link';
            position: fixed; inset: 0;
            background: rgba(124,58,237,0.08);
            border: 3px dashed var(--cosmic-purple);
            display: flex; align-items: center; justify-content: center;
            color: var(--cosmic-purple);
            font-size: 1.2rem; font-weight: 600;
            pointer-events: none;
            z-index: 1200;
        }

        .top-bar {
            position: absolute;
            top: 0.75rem;
            right: 1.25rem;
            display: flex;
            align-items: center;
            z-index: 500;
        }
        .top-bar .top-btn { padding: 0.35rem; min-width: unset; position: relative; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 0.85rem; }
        .top-btn-wrap { position: relative; display: inline-flex; }
        @media (hover: hover) and (pointer: fine) {
            #view-toggle:hover, #surprise-btn:hover, #sleep-btn:hover, #settings-btn:hover { color: var(--cosmic-purple); }
            #theme-toggle:hover { color: var(--cosmic-purple); transform: rotate(20deg) scale(1.2); }
            #surprise-btn:hover { transform: rotate(15deg) scale(1.15); }
        }
        .sleep-active { color: var(--cosmic-purple) !important; }
        .countdown-badge {
            position: absolute;
            top: -2px; right: -2px;
            background: var(--cosmic-purple);
            color: #fff;
            font-size: 0.55rem;
            border-radius: 999px;
            padding: 1px 4px;
            line-height: 1;
            min-width: 1.1rem;
            text-align: center;
            font-weight: 600;
        }

        /* Dropdown menu (settings) */
        .menu {
            position: absolute;
            top: calc(100% + 0.4rem);
            right: 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.35rem;
            display: none;
            flex-direction: column;
            min-width: 11rem;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            z-index: 600;
        }
        .menu.show { display: flex; }
        .menu button {
            background: none;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.78rem;
            text-align: left;
            padding: 0.5rem 0.65rem;
            border-radius: 0.35rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }
        .menu button:hover { background: var(--card-hover); color: var(--cosmic-purple); }
        .menu button i { font-size: 0.7rem; width: 0.9rem; text-align: center; color: var(--text-muted); }
        .menu button:hover i { color: var(--cosmic-purple); }

        /* Sleep timer popover */
        .sleep-popover {
            position: absolute;
            top: calc(100% + 0.4rem);
            right: 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.55rem;
            display: none;
            gap: 0.3rem;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            z-index: 600;
        }
        .sleep-popover.show { display: flex; }
        .sleep-popover button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.25rem 0.55rem;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
        }
        .sleep-popover button:hover { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }
        .sleep-popover button.cancel { border-color: transparent; color: var(--text-muted); }

        .slow-walking-header { margin-bottom: 1.75rem; }
        .slow-walking-title {
            font-size: 1.75rem; font-weight: 600;
            letter-spacing: -0.025em; margin: 0;
            display: flex; align-items: center; gap: 0.6rem;
        }

        /* Now Playing */
        .now-playing {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 760px) { .now-playing { grid-template-columns: 1fr; } }

        .video-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
        }
        .video-box .placeholder {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.875rem;
            text-align: center;
            padding: 1rem;
        }
        #yt-walk { width: 100%; height: 100%; border: 0; display: block; }

        /* Cinema view */
        .view-cinema .now-playing { grid-template-columns: 1fr; }
        .view-cinema .controls-card {
            flex-direction: row;
            align-items: center;
            padding: 0.65rem 1rem;
            gap: 1.25rem;
        }
        .view-cinema .now-meta {
            flex: 1;
            min-height: unset;
            flex-direction: row;
            align-items: center;
            gap: 0.35rem;
            overflow: hidden;
        }
        .view-cinema .now-walk-name {
            font-size: 0.82rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .view-cinema .now-track-name::before { content: '·'; margin-right: 0.35rem; }
        .view-cinema .vol-text,
        .view-cinema .vol-val { display: none; }
        .view-cinema .vol-row { gap: 0.4rem; }
        .view-cinema input[type="range"] { width: 72px; }
        /* Music mini-player (visible so YouTube ads can be skipped) */
        .music-mini {
            position: fixed;
            bottom: 0.85rem;
            right: 0.85rem;
            width: 360px; height: 202px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.35);
            z-index: 400;
            transition: opacity 0.2s, transform 0.2s, width 0.2s, height 0.2s;
            display: none;
        }
        .music-mini.has-track { display: block; }
        .music-mini.collapsed { transform: translateY(calc(100% - 1.6rem)); opacity: 0.55; }
        .music-mini:hover { opacity: 1; }
        .music-mini-tab {
            position: absolute;
            bottom: 0; left: 0;
            background: rgba(0,0,0,0.65);
            color: rgba(255,255,255,0.7);
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.2rem 0.55rem;
            font-size: 0.65rem;
            cursor: pointer;
            z-index: 2;
            border-top-right-radius: 0.4rem;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .music-mini:hover .music-mini-tab,
        .music-mini.collapsed .music-mini-tab { opacity: 1; }
        .music-mini-tab:hover { color: #fff; }
        .music-mini-tab i { font-size: 0.6rem; }
        @media (max-width: 520px) {
            .music-mini { width: 240px; height: 135px; bottom: 0.55rem; right: 0.55rem; }
        }
        #yt-music { width: 100%; height: 100%; border: 0; display: block; }

        .controls-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1.1rem 1.1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }
        .now-meta { display: flex; flex-direction: column; gap: 0.25rem; min-height: 2.6rem; }
        .now-walk-name { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
        .now-track-name {
            font-size: 0.8125rem; color: var(--text-muted);
            display: flex; align-items: center; gap: 0.4rem;
        }
        .now-track-name i { font-size: 0.7rem; }
        .now-empty { font-size: 0.8125rem; color: var(--text-muted); font-style: italic; }

        .play-row { display: flex; align-items: center; gap: 0.75rem; }
        .play-btn {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            border-radius: 999px;
            width: 3rem; height: 3rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, opacity 0.2s;
        }
        .play-btn:hover:not(:disabled) { transform: scale(1.05); }
        .play-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .save-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.5rem 0.85rem;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s, border-color 0.2s;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .save-btn:hover:not(:disabled) { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }
        .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .music-controls {
            display: flex; align-items: center; gap: 0.4rem;
            margin-top: -0.25rem;
        }
        .mc-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            width: 2rem; height: 2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            transition: color 0.2s, border-color 0.2s;
        }
        .mc-btn:hover { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }
        .view-cinema .music-controls { margin-top: 0; }

        .vol-row {
            display: grid;
            grid-template-columns: 1rem auto 1fr auto;
            align-items: center;
            gap: 0.5rem;
        }
        .vol-icon { color: var(--text-muted); font-size: 0.75rem; text-align: center; }
        .vol-text {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: var(--ls-mid); color: var(--text-muted); white-space: nowrap;
        }
        .vol-val { font-size: 0.7rem; color: var(--text-muted); min-width: 1.5rem; text-align: right; }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            background: var(--border);
            border-radius: 999px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px; height: 14px;
            background: var(--cosmic-purple);
            border-radius: 50%;
            border: none;
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px; height: 14px;
            background: var(--cosmic-purple);
            border-radius: 50%;
            border: none;
        }

        /* Mood preset row */
        .moods {
            display: flex; flex-wrap: wrap; gap: 0.4rem;
            margin-bottom: 1.25rem;
            align-items: center;
        }
        .moods-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: var(--ls-wide);
            color: var(--text-muted);
            font-weight: 700;
            margin-right: 0.35rem;
        }
        .mood-pill {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.3rem 0.75rem;
            font-size: 0.72rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .mood-pill:hover { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }
        .mood-pill i { font-size: 0.65rem; }

        /* Decks */
        .decks {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }
        @media (max-width: 760px) { .decks { grid-template-columns: 1fr; } }

        .deck-search {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 0.4rem;
            padding: 0.4rem 0.6rem;
            font-size: 0.78rem;
            font-family: inherit;
            outline: none;
            margin-bottom: 0.55rem;
        }
        .deck-search:focus { border-color: var(--cosmic-purple); }

        .deck {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1rem;
            display: flex; flex-direction: column;
        }
        .deck-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        .deck-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: var(--ls-wide);
            color: var(--text-muted);
            font-weight: 700;
            margin: 0;
        }
        .add-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.25rem 0.65rem;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s, border-color 0.2s;
        }
        .add-btn:hover { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }

        .filter-row {
            display: flex; flex-wrap: wrap; gap: 0.35rem;
            margin-bottom: 0.6rem;
        }
        .filter-pill {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .filter-pill.active {
            background: var(--text-main);
            color: var(--bg);
            border-color: var(--text-main);
        }

        .deck-list {
            display: flex; flex-direction: column;
            gap: 0.4rem;
            max-height: 26rem;
            overflow-y: auto;
            padding-right: 0.25rem;
        }
        .deck-list::-webkit-scrollbar { width: 6px; }
        .deck-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

        .item {
            display: flex; align-items: center; gap: 0.65rem;
            padding: 0.55rem 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }
        @media (hover: hover) and (pointer: fine) { .item:hover { background: var(--card-hover); } }
        .item.active {
            background: var(--card-hover);
            border-color: var(--cosmic-purple);
        }
        .item-thumb {
            width: 56px; height: 36px;
            background: #000 center/cover no-repeat;
            border-radius: 0.3rem;
            flex-shrink: 0;
            position: relative;
        }
        .item-thumb.no-img {
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.7rem;
        }
        .item-meta { flex: 1; min-width: 0; }
        .item-name {
            font-size: 0.825rem;
            font-weight: 500;
            line-height: 1.25;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-tags {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-del, .item-edit {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.7rem; cursor: pointer;
            opacity: 0; transition: opacity 0.15s, color 0.15s;
            padding: 0.25rem;
        }
        @media (hover: hover) and (pointer: fine) {
            .item:hover .item-del,
            .item:hover .item-edit { opacity: 0.7; }
            .item-del:hover { color: #dc2626; opacity: 1; }
            .item-edit:hover { color: var(--cosmic-purple); opacity: 1; }
        }
        /* On touch: always show edit/delete so they're reachable without hover */
        @media (hover: none) {
            .item-del, .item-edit { opacity: 0.5; }
        }

        /* Pairings */
        .pairings {
            margin-bottom: 1.5rem;
        }
        .pair-list {
            display: flex; gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .pair-list::-webkit-scrollbar { height: 6px; }
        .pair-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
        .pair-card {
            flex-shrink: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.6rem;
            padding: 0.6rem 0.85rem;
            cursor: pointer;
            min-width: 14rem;
            transition: border-color 0.2s, transform 0.2s;
            position: relative;
        }
        @media (hover: hover) and (pointer: fine) {
            .pair-card:hover { border-color: var(--cosmic-purple); transform: translateY(-2px); }
            .pair-card:hover .pair-del { opacity: 0.6; }
            .pair-del:hover { color: #dc2626; opacity: 1; }
        }
        @media (hover: none) { .pair-del { opacity: 0.5; } }
        .pair-name { font-size: 0.8rem; font-weight: 600; }
        .pair-detail {
            font-size: 0.7rem; color: var(--text-muted);
            margin-top: 0.2rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .pair-del {
            position: absolute; top: 0.3rem; right: 0.3rem;
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; opacity: 0; transition: opacity 0.15s;
            font-size: 0.7rem; padding: 0.2rem;
        }
        .pair-empty {
            font-size: 0.8125rem;
            color: var(--text-muted);
            font-style: italic;
            padding: 0.5rem 0;
        }

        /* Discover panel */
        #discover-btn.has-key i { color: var(--cosmic-purple); }
        .discover-panel {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1rem;
            width: 100%;
            max-width: 56rem;
            max-height: 88vh;
            display: flex; flex-direction: column;
            gap: 0.8rem;
        }
        .discover-head {
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.75rem;
        }
        .discover-tabs { display: flex; gap: 0.4rem; }
        .discover-tab {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.35rem 0.85rem;
            font-size: 0.78rem;
            cursor: pointer;
            font-family: inherit;
        }
        .discover-tab.active {
            background: var(--text-main);
            color: var(--bg);
            border-color: var(--text-main);
        }
        .discover-controls {
            display: flex; gap: 0.5rem; align-items: center;
        }
        .discover-controls input,
        .discover-controls select {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 0.4rem;
            padding: 0.5rem 0.65rem;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
        }
        .discover-controls select { flex: 0 0 auto; }
        .discover-controls input:focus { border-color: var(--cosmic-purple); }
        .discover-results, .discover-bookmarks {
            display: flex; flex-direction: column; gap: 0.4rem;
            overflow-y: auto;
            min-height: 6rem;
            max-height: 60vh;
        }
        .discover-bookmarks { max-height: none; min-height: 0; }
        .discover-bookmarks:not(:empty) { padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); margin-bottom: 0.25rem; }
        .discover-card {
            display: flex; align-items: center; gap: 0.7rem;
            padding: 0.55rem;
            border-radius: 0.5rem;
            border: 1px solid transparent;
        }
        .discover-card:hover { border-color: var(--border); background: var(--card-hover); }
        .discover-thumb {
            width: 96px; height: 54px;
            background: #000 center/cover no-repeat;
            border-radius: 0.3rem;
            flex-shrink: 0;
            position: relative;
        }
        .discover-duration {
            position: absolute; bottom: 2px; right: 2px;
            background: rgba(0,0,0,0.75);
            color: #fff; font-size: 0.6rem;
            padding: 1px 4px; border-radius: 3px;
        }
        .discover-meta { flex: 1; min-width: 0; }
        .discover-name {
            font-size: 0.85rem; font-weight: 500; line-height: 1.3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .discover-sub {
            font-size: 0.7rem; color: var(--text-muted);
            margin-top: 0.2rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .discover-actions {
            display: flex; gap: 0.3rem;
            flex-shrink: 0;
        }
        .discover-actions button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.3rem 0.65rem;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }
        .discover-actions button:hover { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }
        .discover-empty {
            color: var(--text-muted); font-size: 0.8125rem;
            padding: 1rem 0.5rem; text-align: center; line-height: 1.5;
        }
        .discover-loadmore {
            text-align: center; padding: 0.5rem;
        }
        .discover-loadmore button {
            background: none; border: 1px solid var(--border);
            color: var(--text-muted); border-radius: 999px;
            padding: 0.4rem 1rem; font-size: 0.75rem; cursor: pointer;
            font-family: inherit;
        }
        .discover-loadmore button:hover { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }
        @media (max-width: 600px) {
            .discover-thumb { width: 72px; height: 40px; }
            .discover-card { gap: 0.5rem; padding: 0.45rem; }
        }

        /* Channel chips */
        .channel-chips {
            display: flex; gap: 0.35rem; flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .channel-chip {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.25rem 0.7rem;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex; align-items: center; gap: 0.35rem;
        }
        .channel-chip:hover { color: var(--cosmic-purple); border-color: var(--cosmic-purple); }
        .channel-chip.active {
            background: var(--cosmic-purple);
            color: #fff;
            border-color: var(--cosmic-purple);
        }
        .channel-chip i { font-size: 0.6rem; }
        .browse-banner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.45rem 0.6rem;
            background: var(--card-hover);
            border: 1px solid var(--border);
            border-radius: 0.4rem;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
        }
        .browse-banner button {
            background: none; border: none; color: var(--cosmic-purple);
            cursor: pointer; font-family: inherit; font-size: 0.75rem;
        }

        /* Add modal */
        .modal-bg {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-bg.show { display: flex; }
        .modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1.5rem;
            max-width: 28rem; width: 100%;
        }
        .modal h3 {
            margin: 0 0 1rem;
            font-size: 1rem; font-weight: 600;
        }
        .modal label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: var(--ls-mid);
            color: var(--text-muted);
            margin-bottom: 0.35rem;
            margin-top: 0.85rem;
        }
        .modal input, .modal textarea {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 0.4rem;
            padding: 0.55rem 0.7rem;
            font-size: 0.875rem;
            font-family: inherit;
            outline: none;
            resize: vertical;
        }
        .modal input:focus, .modal textarea:focus { border-color: var(--cosmic-purple); }
        .modal input:disabled { opacity: 0.55; cursor: not-allowed; }
        .modal-toggle {
            display: flex; gap: 0.5rem;
            margin-top: 0.35rem;
            font-size: 0.7rem;
        }
        .modal-toggle button {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 0.2rem 0; font-family: inherit;
            font-size: 0.7rem; text-decoration: underline;
        }
        .modal-toggle button:hover { color: var(--cosmic-purple); }
        .modal-actions {
            display: flex; gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.25rem;
        }
        .btn-primary, .btn-ghost {
            border-radius: 999px;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: var(--text-main);
            color: var(--bg);
        }
        .btn-ghost {
            background: none;
            color: var(--text-muted);
            border-color: var(--border);
        }
        .btn-ghost:hover { color: var(--text-main); }
        .modal-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 0.5rem 0 0;
            line-height: 1.45;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button id="discover-btn" class="top-btn" aria-label="Discover on YouTube" title="Discover on YouTube">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <button id="surprise-btn" class="top-btn" aria-label="Surprise me" title="Surprise me">
            <i class="fa-solid fa-dice"></i>
        </button>
        <div class="top-btn-wrap">
            <button id="sleep-btn" class="top-btn" aria-label="Sleep timer" title="Sleep timer">
                <i class="fa-solid fa-hourglass-half"></i>
                <span id="sleep-countdown" class="countdown-badge" style="display:none;"></span>
            </button>
            <div id="sleep-popover" class="sleep-popover">
                <button data-sleep="5">5m</button>
                <button data-sleep="15">15m</button>
                <button data-sleep="30">30m</button>
                <button data-sleep="60">60m</button>
                <button data-sleep="0" class="cancel">Off</button>
            </div>
        </div>
        <div class="top-btn-wrap">
            <button id="settings-btn" class="top-btn" aria-label="Library menu" title="Library">
                <i class="fa-solid fa-gear"></i>
            </button>
            <div id="settings-menu" class="menu">
                <button data-action="export"><i class="fa-solid fa-download"></i> Export library</button>
                <button data-action="import"><i class="fa-solid fa-upload"></i> Import library</button>
                <button data-action="bulk-walk"><i class="fa-solid fa-person-walking"></i> Bulk add walks</button>
                <button data-action="bulk-track"><i class="fa-solid fa-music"></i> Bulk add tracks</button>
                <button data-action="copy-link"><i class="fa-solid fa-link"></i> Copy session link</button>
                <button data-action="api-key"><i class="fa-solid fa-key"></i> YouTube API key&hellip;</button>
            </div>
        </div>
        <button id="view-toggle" class="top-btn" aria-label="Toggle cinema view">
            <i id="view-icon" class="fa-solid fa-expand"></i>
        </button>
        <button id="theme-toggle" class="top-btn" aria-label="Toggle dark mode">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </div>
    <input id="import-file" type="file" accept="application/json,.json" style="display:none;">

    <div class="wrap">
        <header class="slow-walking-header">
            <h1 class="slow-walking-title">
                &#127747; Slow Walking
            </h1>
        </header>

        <div class="now-playing">
            <div class="video-box">
                <div id="video-placeholder" class="placeholder">Pick a walk to begin</div>
                <div id="yt-walk"></div>
            </div>

            <div class="controls-card">
                <div class="now-meta">
                    <div id="now-walk" class="now-walk-name now-empty">No walk selected</div>
                    <div id="now-track" class="now-track-name now-empty">No track selected</div>
                </div>

                <div class="play-row">
                    <button id="play-btn" class="play-btn" aria-label="Play / pause" disabled>
                        <i class="fa-solid fa-play"></i>
                    </button>
                    <button id="save-btn" class="save-btn" disabled>
                        <i class="fa-regular fa-bookmark"></i> Save pair
                    </button>
                </div>

                <div class="vol-row">
                    <i class="vol-icon fa-solid fa-music"></i>
                    <span class="vol-text">Music</span>
                    <input id="music-vol" type="range" min="0" max="100" value="70">
                    <span id="music-vol-val" class="vol-val">70</span>
                </div>

                <div id="music-controls" class="music-controls" style="display:none;">
                    <button id="mode-btn" class="mc-btn" aria-label="Playback mode" title="Shuffle">
                        <i class="fa-solid fa-shuffle"></i>
                    </button>
                    <button id="skip-btn" class="mc-btn" aria-label="Next track" title="Next track">
                        <i class="fa-solid fa-forward-step"></i>
                    </button>
                </div>

                <div class="vol-row">
                    <i class="vol-icon fa-solid fa-city"></i>
                    <span class="vol-text">City</span>
                    <input id="city-vol" type="range" min="0" max="100" value="15">
                    <span id="city-vol-val" class="vol-val">15</span>
                </div>
            </div>
        </div>

        <section class="pairings">
            <div class="deck-head" style="margin-bottom: 0.5rem;">
                <h2 class="deck-title">Saved pairings</h2>
            </div>
            <div id="pair-list" class="pair-list"></div>
        </section>

        <div id="moods" class="moods"></div>

        <div class="decks">
            <div class="deck">
                <div class="deck-head">
                    <h2 class="deck-title"><i class="fa-solid fa-person-walking" style="margin-right:0.4rem;"></i>Walks</h2>
                    <button class="add-btn" data-add="walk"><i class="fa-solid fa-plus"></i> Add</button>
                </div>
                <input id="walk-search" class="deck-search" type="search" placeholder="Search walks…">
                <div id="walk-channels" class="channel-chips"></div>
                <div id="walk-banner" class="browse-banner" style="display:none;"></div>
                <div id="walk-filters" class="filter-row"></div>
                <div id="walk-list" class="deck-list"></div>
            </div>

            <div class="deck">
                <div class="deck-head">
                    <h2 class="deck-title"><i class="fa-solid fa-music" style="margin-right:0.4rem;"></i>Music</h2>
                    <button class="add-btn" data-add="track"><i class="fa-solid fa-plus"></i> Add</button>
                </div>
                <input id="track-search" class="deck-search" type="search" placeholder="Search tracks…">
                <div id="track-channels" class="channel-chips"></div>
                <div id="track-banner" class="browse-banner" style="display:none;"></div>
                <div id="track-filters" class="filter-row"></div>
                <div id="track-list" class="deck-list"></div>
            </div>
        </div>
    </div>

    <div id="music-mini" class="music-mini">
        <div class="music-mini-tab" id="music-mini-tab">
            <span><i class="fa-solid fa-music"></i> Music</span>
            <i id="music-mini-chevron" class="fa-solid fa-chevron-down"></i>
        </div>
        <div id="yt-music"></div>
    </div>

    <div id="modal-bg" class="modal-bg">
        <div class="modal">
            <h3 id="modal-title">Add</h3>
            <label id="modal-url-label" for="modal-url">YouTube URL or video ID</label>
            <input id="modal-url" type="text" placeholder="https://www.youtube.com/watch?v=...">
            <textarea id="modal-url-bulk" rows="6" placeholder="Paste one YouTube URL per line…" style="display:none;"></textarea>
            <div id="modal-toggle-row" class="modal-toggle">
                <button id="modal-toggle-bulk" type="button">Bulk add (paste many)</button>
            </div>
            <label id="modal-name-label" for="modal-name">Name</label>
            <input id="modal-name" type="text" placeholder="e.g. Hongdae, rainy Sunday">
            <label for="modal-tags">Tags (comma-separated)</label>
            <input id="modal-tags" type="text" placeholder="hongdae, night, rain">
            <p id="modal-hint" class="modal-hint">Tag walks by neighbourhood (<code>hongdae</code>, <code>gangnam</code>) and vibe (<code>night</code>, <code>rain</code>). Tag music by artist or mood so filters group naturally.</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-ghost">Cancel</button>
                <button id="modal-save" class="btn-primary">Add</button>
            </div>
        </div>
    </div>

    <div id="discover-bg" class="modal-bg">
        <div class="discover-panel">
            <div class="discover-head">
                <div class="discover-tabs">
                    <button class="discover-tab active" data-tab="search">Search</button>
                    <button class="discover-tab" data-tab="channels">Channels</button>
                </div>
                <button id="discover-close" class="btn-ghost" style="padding:0.35rem 0.7rem;">Close</button>
            </div>

            <div id="tab-search" class="discover-tab-body">
                <div class="discover-controls">
                    <input id="discover-input" type="search" placeholder="Search YouTube&hellip;">
                    <select id="discover-type">
                        <option value="video">Videos</option>
                        <option value="playlist">Playlists</option>
                        <option value="channel">Channels</option>
                    </select>
                </div>
                <div id="discover-results" class="discover-results"></div>
            </div>

            <div id="tab-channels" class="discover-tab-body" style="display:none;">
                <div class="discover-controls">
                    <input id="channel-input" type="text" placeholder="Paste a channel URL or @handle&hellip;">
                    <button id="channel-add-walk" class="btn-ghost" style="padding:0.45rem 0.7rem;">+ Walks</button>
                    <button id="channel-add-track" class="btn-ghost" style="padding:0.45rem 0.7rem;">+ Music</button>
                </div>
                <div id="channel-bookmarks" class="discover-bookmarks"></div>
                <div id="channel-uploads" class="discover-results"></div>
            </div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(() => {}); }); }</script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="slow-walking.js"></script>
</body>
</html>
