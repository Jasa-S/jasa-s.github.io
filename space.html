<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
    <meta name="description" content="An interactive space simulation by Jasaman Saini. Hold Space (or tap) to thrust.">
    <meta property="og:title" content="Initiate | Jasaman Saini">
    <meta property="og:description" content="An interactive space simulation. Hold Space or tap to thrust.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Jasa-S/jasa-s.github.io/main/blue-images/224105519781_01.jpg">
    <meta property="og:type" content="website">
    <title>Initiate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237C3AED'/><text y='.9em' font-size='72' x='50%' dominant-baseline='auto' text-anchor='middle' fill='white' font-family='Inter,sans-serif' font-weight='600'>J</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --text-main:  #ffffff;
            --text-muted: #a1a1aa;
            --border:     rgba(255,255,255,0.07);
            --card:       rgba(255,255,255,0.05);
            --cosmic-purple: #7C3AED;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            overflow: hidden;
            background: #000;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-font-smoothing: antialiased;
        }
        canvas {
            display: block;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #space-close {
            position: absolute;
            top: 1.1rem; left: 1.5rem;
            z-index: 200;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0.25rem 0.4rem;
            transition: color 0.2s;
        }
        @media (hover:hover) and (pointer:fine) {
            #space-close:hover { color: var(--cosmic-purple); }
        }

        #start-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; gap: 28px;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(2px);
        }
        #start-btn {
            background: var(--card);
            color: var(--cosmic-purple);
            border: 1px solid rgba(124,58,237,0.45);
            padding: 0.6rem 2.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            border-radius: 999px;
            cursor: pointer;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: background 0.2s, border-color 0.2s;
        }
        @media (hover:hover) and (pointer:fine) {
            #start-btn:hover {
                background: rgba(124,58,237,0.12);
                border-color: var(--cosmic-purple);
            }
        }
        .hint {
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-align: center;
            line-height: 2.2;
        }
        .kbd {
            display: inline-block;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.08em;
        }

        #nasa-panel {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 150;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s;
        }
        #nasa-panel.visible { opacity: 1; }
        .nasa-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            min-width: 200px;
            max-width: 260px;
        }
        .nasa-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }
        .nasa-value {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            color: var(--text-muted);
            line-height: 1.7;
        }
        .nasa-value span.hi {
            color: var(--text-main);
            font-weight: 500;
        }
        .dot {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
            background: #44bb77;
        }
        .dot.warn  { background: #f59e0b; }
        .dot.alert { background: #ef4444; }

        @media (max-width: 768px) {
            #nasa-panel {
                bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
                right: calc(0.75rem + env(safe-area-inset-right, 0px));
                gap: 0.35rem;
            }
            .nasa-card {
                min-width: 140px;
                max-width: 165px;
                padding: 0.55rem 0.75rem;
                border-radius: 0.6rem;
            }
            .nasa-label { font-size: 0.55rem; margin-bottom: 0.2rem; }
            .nasa-value  { font-size: 0.6rem;  line-height: 1.55; }
            .nasa-value .sub { display: none; }
        }

        @media (max-width: 1024px) and (orientation: landscape) and (max-height: 500px) {
            #nasa-panel {
                bottom: 0.4rem;
                right: calc(0.4rem + env(safe-area-inset-right, 0px));
                gap: 0.25rem;
            }
            .nasa-card {
                min-width: 120px;
                max-width: 140px;
                padding: 0.4rem 0.55rem;
                border-radius: 0.5rem;
            }
            .nasa-label { font-size: 0.5rem;  margin-bottom: 0.15rem; }
            .nasa-value  { font-size: 0.55rem; line-height: 1.45; }
            #space-close { top: 0.5rem; left: 0.75rem; }
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
    </script>
</head>
<body>

<button id="space-close">&#8592;&ensp;Return</button>

<div id="start-overlay">
    <button id="start-btn">Initiate</button>
    <div class="hint" id="thrust-hint"></div>
</div>

<div id="nasa-panel">
    <div class="nasa-card">
        <div class="nasa-label">Solar Activity</div>
        <div class="nasa-value" id="val-flare">Loading&hellip;</div>
    </div>
    <div class="nasa-card">
        <div class="nasa-label">Geomagnetic Storm</div>
        <div class="nasa-value" id="val-storm">Loading&hellip;</div>
    </div>
    <div class="nasa-card">
        <div class="nasa-label">Near-Earth Object</div>
        <div class="nasa-value" id="val-neo">Loading&hellip;</div>
    </div>
</div>

<script>
(function(){
    window.isMobile = window.matchMedia('(pointer: coarse) and (hover: none)').matches;
    var el = document.getElementById('thrust-hint');
    if (window.isMobile) {
        el.textContent = 'Tap & hold to thrust';
    } else {
        el.innerHTML = 'Hold <span class="kbd">Space</span> to thrust';
    }
    document.addEventListener('contextmenu', function(e){ e.preventDefault(); }, { passive: false });
    document.addEventListener('touchstart', function(e){
        if(e.touches.length > 1) e.preventDefault();
    }, { passive: false });
})();
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }      from 'three/addons/postprocessing/ShaderPass.js';

document.getElementById('space-close').addEventListener('click', () => { window.location = 'index.html'; });

const isMobile = window.isMobile;

// ── NASA data (cached per day in localStorage) ────────────
const KEY = 'DEMO_KEY';
const today = new Date();
const fmt = d => d.toISOString().split('T')[0];
const d7 = new Date(today); d7.setDate(d7.getDate() - 7);
const todayStr = fmt(today), d7Str = fmt(d7);

function setVal(id, html) { document.getElementById(id).innerHTML = html; }
const sub = html => isMobile ? '' : `<span class="sub">${html}</span>`;

function cachedFetch(url) {
    const cacheKey = 'nasa_cache_' + todayStr + '_' + url;
    try {
        const cached = localStorage.getItem(cacheKey);
        if (cached) return Promise.resolve(JSON.parse(cached));
    } catch(e) {}
    return fetch(url)
        .then(r => r.json())
        .then(data => {
            try { localStorage.setItem(cacheKey, JSON.stringify(data)); } catch(e) {}
            try {
                Object.keys(localStorage)
                    .filter(k => k.startsWith('nasa_cache_') && !k.startsWith('nasa_cache_' + todayStr))
                    .forEach(k => localStorage.removeItem(k));
            } catch(e) {}
            return data;
        });
}

cachedFetch(`https://api.nasa.gov/DONKI/FLR?startDate=${d7Str}&endDate=${todayStr}&api_key=${KEY}`)
    .then(data => {
        if (!data || !data.length) {
            setVal('val-flare', `<span class="dot"></span><span class="hi">Quiet</span>${sub(' &mdash; no flares in 7 days')}`);
            return;
        }
        const last  = data[data.length - 1];
        const cls   = last.classType || '?';
        const when  = last.beginTime ? last.beginTime.slice(0, 10) : '';
        const level = cls.startsWith('X') ? 'alert' : cls.startsWith('M') ? 'warn' : '';
        setVal('val-flare',
            `<span class="dot ${level}"></span><span class="hi">Class ${cls}</span> flare
             ${sub(`<br>${when} &mdash; ${data.length} event${data.length > 1 ? 's' : ''} this week`)}`);
    })
    .catch(() => setVal('val-flare', '<span class="dot warn"></span>Unavailable'));

cachedFetch(`https://api.nasa.gov/DONKI/GST?startDate=${d7Str}&endDate=${todayStr}&api_key=${KEY}`)
    .then(data => {
        if (!data || !data.length) {
            setVal('val-storm', `<span class="dot"></span><span class="hi">None</span>${sub(' in past 7 days')}`);
            return;
        }
        const last  = data[data.length - 1];
        const kpMax = last.allKpIndex ? Math.max(...last.allKpIndex.map(k => k.kpIndex)) : '?';
        const kpStr = kpMax !== '?' ? kpMax.toFixed(1) : '?';
        const level = kpMax >= 7 ? 'alert' : kpMax >= 5 ? 'warn' : '';
        const when  = last.startTime ? last.startTime.slice(0, 10) : '';
        setVal('val-storm',
            `<span class="dot ${level}"></span>Kp <span class="hi">${kpStr}</span> peak
             ${sub(`<br>${when} &mdash; ${data.length} storm${data.length > 1 ? 's' : ''} this week`)}`);
    })
    .catch(() => setVal('val-storm', '<span class="dot warn"></span>Unavailable'));

cachedFetch(`https://api.nasa.gov/neo/rest/v1/feed?start_date=${d7Str}&end_date=${todayStr}&api_key=${KEY}`)
    .then(data => {
        const total = data.element_count || 0;
        let closest = null, minDist = Infinity;
        Object.values(data.near_earth_objects || {}).forEach(day => {
            day.forEach(neo => {
                const dist = parseFloat(neo.close_approach_data?.[0]?.miss_distance?.lunar ?? Infinity);
                if (dist < minDist) { minDist = dist; closest = neo; }
            });
        });
        if (!closest) {
            setVal('val-neo', `<span class="dot"></span><span class="hi">${total}</span>${sub(' tracked this week')}`);
            return;
        }
        const name      = closest.name.replace(/[()]/g, '').trim();
        const lunarDist = minDist.toFixed(1);
        const hazard    = closest.is_potentially_hazardous_asteroid;
        const level     = hazard ? 'warn' : '';
        const diam      = closest.estimated_diameter?.meters;
        const diamStr   = diam ? `${Math.round(diam.estimated_diameter_min)}–${Math.round(diam.estimated_diameter_max)} m` : '';
        setVal('val-neo',
            `<span class="dot ${level}"></span><span class="hi">${name}</span>
             ${sub(`<br>${lunarDist} LD away &mdash; ${diamStr}<br><span style="opacity:.55;font-size:0.6rem;">${total} objects tracked this week</span>`)}`);
    })
    .catch(() => setVal('val-neo', '<span class="dot warn"></span>Unavailable'));

// ── renderer ───────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault(), { passive: false });
renderer.domElement.addEventListener('touchstart',  e => e.preventDefault(), { passive: false });

// ── scene / camera ─────────────────────────────────────────
const scene = new THREE.Scene();
const baseFOV = 56;
const camera = new THREE.PerspectiveCamera(baseFOV, innerWidth/innerHeight, 0.1, 80000);
camera.position.set(0, 0, 28);
camera.lookAt(0, 0, 0);

// ── sky shader ─────────────────────────────────────────────
const SKY_VS = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`;
const SKY_FS = `
  uniform float uTime; varying vec2 vUv;
  float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
  float noise(vec2 p){
    vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
    return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
  }
  float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<6;i++){v+=a*noise(p);p*=2.1;a*=0.5;} return v; }
  void main(){
    float t=uTime*0.018;
    float n1=fbm(vUv*2.8+vec2(t,t*0.6));
    float n2=fbm(vUv*4.2-vec2(t*0.7,t*1.1));
    float n3=fbm(vUv*1.6+vec2(-t*0.4,t*0.9));
    vec3 col=vec3(0.005,0.018,0.014);
    col=mix(col,vec3(0.04,0.22,0.12),clamp(n1*1.4,0.0,1.0));
    col=mix(col,vec3(0.08,0.55,0.28),clamp(n2*0.7,0.0,1.0));
    col=mix(col,vec3(0.18,0.06,0.38),clamp(n3*0.5,0.0,1.0));
    col=mix(col,vec3(0.0,0.45,0.30),clamp(n1*n2*1.8,0.0,1.0));
    float r=1.0-length(vUv-0.5)*1.1;
    col+=vec3(0.08,0.55,0.28)*clamp(r*0.18,0.0,0.18);
    gl_FragColor=vec4(col,1.0);
  }
`;
const skyUniforms = { uTime:{ value:0 } };
const skyScene  = new THREE.Scene();
const skyCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
skyScene.add(new THREE.Mesh(
    new THREE.PlaneGeometry(2,2),
    new THREE.ShaderMaterial({
        uniforms: skyUniforms,
        vertexShader: SKY_VS,
        fragmentShader: SKY_FS,
        depthWrite: false,
        depthTest: false
    })
));

// ── post-processing ────────────────────────────────────────
const composer = new EffectComposer(renderer);
const rpMain = new RenderPass(scene, camera);
rpMain.clear = false;
rpMain.clearDepth = true;
composer.addPass(new RenderPass(skyScene, skyCamera));
composer.addPass(rpMain);
const BLOOM_BASE = 0.7;
const bloom = new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    BLOOM_BASE, 0.45, 0.78
);
composer.addPass(bloom);
composer.addPass(new ShaderPass({
    uniforms:{ tDiffuse:{value:null}, d:{value:1.05}, o:{value:0.97} },
    vertexShader:  `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
    fragmentShader:`uniform sampler2D tDiffuse; uniform float d,o; varying vec2 vUv;
      void main(){ vec4 c=texture2D(tDiffuse,vUv); vec2 uv=(vUv-0.5)*2.0;
        gl_FragColor=vec4(c.rgb*clamp(o-d*dot(uv,uv),0.0,1.0),c.a); }`
}));

// ── lighting ───────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a0f0a, 1.2));
const sun = new THREE.DirectionalLight(0xfff8ee, 3.5);
sun.position.set(600, 250, 300); scene.add(sun);
const fill = new THREE.DirectionalLight(0x0a1520, 0.4);
fill.position.set(-300, -80, -200); scene.add(fill);

// ── moon ───────────────────────────────────────────────────
const texLoader = new THREE.TextureLoader();
const moonMat = new THREE.MeshStandardMaterial({ roughness: 0.95 });
texLoader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg', t => {
    moonMat.map = t; moonMat.needsUpdate = true;
});
const moon = new THREE.Mesh(new THREE.SphereGeometry(110, 80, 80), moonMat);
moon.position.set(0, 0, -1200);
scene.add(moon);

// ── earth ──────────────────────────────────────────────────
const earth = new THREE.Mesh(
    new THREE.SphereGeometry(48, 40, 40),
    new THREE.MeshStandardMaterial({ color:0x1a4d8a, roughness:0.75 })
);
earth.position.set(-820, 220, -5000); scene.add(earth);
earth.add(new THREE.Mesh(
    new THREE.SphereGeometry(51, 40, 40),
    new THREE.MeshStandardMaterial({ color:0x33aaff, transparent:true, opacity:0.10, side:THREE.FrontSide })
));

// ── stars ──────────────────────────────────────────────────
const STARS = 2400;
const sGeo = new THREE.BufferGeometry();
const sP = new Float32Array(STARS*6), sC = new Float32Array(STARS*6);
const SCOLS = [[1,1,1],[0.7,0.9,1],[1,0.95,0.8],[0.6,1,0.75],[0.9,0.7,1]];
for(let i=0;i<STARS;i++){
    const x=(Math.random()-.5)*1400, y=(Math.random()-.5)*1000,
          z=(Math.random()-.5)*5000-500, ix=i*6;
    sP[ix]=x; sP[ix+1]=y; sP[ix+2]=z;
    sP[ix+3]=x; sP[ix+4]=y; sP[ix+5]=z;
    const c=SCOLS[Math.floor(Math.random()*SCOLS.length)];
    sC[ix]=c[0]; sC[ix+1]=c[1]; sC[ix+2]=c[2];
    sC[ix+3]=c[0]; sC[ix+4]=c[1]; sC[ix+5]=c[2];
}
sGeo.setAttribute('position', new THREE.BufferAttribute(sP, 3));
sGeo.setAttribute('color',    new THREE.BufferAttribute(sC, 3));
const stars = new THREE.LineSegments(sGeo, new THREE.LineBasicMaterial({
    vertexColors:true, transparent:true, opacity:0.8
}));
scene.add(stars);

// ── dust ───────────────────────────────────────────────────
const dGeo = new THREE.BufferGeometry();
const dP = new Float32Array(700*3);
for(let i=0;i<700;i++){
    dP[i*3]=(Math.random()-.5)*350;
    dP[i*3+1]=(Math.random()-.5)*250;
    dP[i*3+2]=(Math.random()-.5)*900-100;
}
dGeo.setAttribute('position', new THREE.BufferAttribute(dP, 3));
const dust = new THREE.Points(dGeo, new THREE.PointsMaterial({
    color: 0x44bb77, size:0.15, transparent:true, opacity:0.28
}));
scene.add(dust);

// ── input ──────────────────────────────────────────────────
let started = false, thrusting = false;

window.addEventListener('keydown', e => {
    if(!started) return;
    if(e.code === 'Space'){ thrusting = true; e.preventDefault(); }
});
window.addEventListener('keyup', e => {
    if(e.code === 'Space') thrusting = false;
});
window.addEventListener('pointerdown', e => { if(started && e.target.id !== 'start-btn') thrusting = true; });
window.addEventListener('pointerup',      () => thrusting = false);
window.addEventListener('pointercancel',  () => thrusting = false);

document.getElementById('start-btn').addEventListener('click', () => {
    const ov = document.getElementById('start-overlay');
    ov.style.transition = 'opacity .4s';
    ov.style.opacity = '0';
    setTimeout(() => ov.remove(), 420);
    started = true;
    document.getElementById('nasa-panel').classList.add('visible');
});

let aspect = innerWidth / innerHeight;
window.addEventListener('resize', () => {
    aspect = innerWidth / innerHeight;
    camera.aspect = aspect;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
});

// ── animate ────────────────────────────────────────────────
const clock = new THREE.Clock();
let time = 0, starSpeed = 3, thrust = 0;

function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), .05);
    time += dt;

    thrust = THREE.MathUtils.lerp(thrust, thrusting ? 1 : 0, dt * (thrusting ? 2.5 : 5.0));

    skyUniforms.uTime.value = time % 1000.0;

    starSpeed = THREE.MathUtils.lerp(starSpeed, thrusting ? 960 : 3, dt * (thrusting ? 2 : 4));

    const speedMult = aspect < 1 ? Math.max(1, 1 / aspect) : 1;
    const effectiveSpeed = starSpeed * speedMult;

    const stretch = 1 + (thrust * 40);
    const pa = stars.geometry.attributes.position.array;
    for(let i=0; i<STARS; i++){
        const ix = i*6;
        pa[ix+2] += effectiveSpeed * dt;
        if(pa[ix+2] > 55){
            const nz = -5000 - Math.random()*600;
            pa[ix+2] = nz; pa[ix+5] = nz;
            pa[ix]   = (Math.random()-.5)*1400; pa[ix+3] = pa[ix];
            pa[ix+1] = (Math.random()-.5)*1000; pa[ix+4] = pa[ix+1];
        }
        pa[ix+5] = pa[ix+2] - (1.5 * stretch);
    }
    stars.geometry.attributes.position.needsUpdate = true;

    const da = dust.geometry.attributes.position.array;
    for(let i=0; i<700; i++){
        da[i*3+2] += (effectiveSpeed * .22 + .8) * dt;
        if(da[i*3+2] > 40) da[i*3+2] = -900 - Math.random()*200;
    }
    dust.geometry.attributes.position.needsUpdate = true;

    moon.rotation.y  += .005 * dt;
    earth.rotation.y += .008 * dt;

    camera.fov = THREE.MathUtils.lerp(camera.fov, baseFOV + (thrust * 25), dt * 3);
    camera.updateProjectionMatrix();

    if (thrust > 0.1) {
        camera.position.x = (Math.random() - 0.5) * thrust * 0.2;
        camera.position.y = (Math.random() - 0.5) * thrust * 0.2;
    } else {
        camera.position.x = THREE.MathUtils.lerp(camera.position.x, 0, dt * 5);
        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 0, dt * 5);
    }

    bloom.strength = THREE.MathUtils.lerp(bloom.strength, BLOOM_BASE + thrust * 1.2, dt * 5);

    composer.render();
}

animate();
</script>
