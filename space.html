<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta property="og:title" content="SPACE">
    <meta property="og:description" content="An interactive 3D space scene with live NASA solar activity and near-Earth object data.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Jasa-S/jasa-s.github.io/main/blue-images/profileImage.png">
    <meta property="og:type" content="website">
    <title>SPACE</title>
    <link rel="icon" type="image/svg+xml" href="/earth-icon.svg">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <style>
        :root {
            --text-main:  #ffffff;
            --text-muted: #c4c4ce;
            --text-dim:   #8a8a94;
            --border:     rgba(255,255,255,0.08);
            --card:       rgba(255,255,255,0.05);
            --cosmic-purple:        #7C3AED;
            --cosmic-purple-border: rgba(124,58,237,0.45);
            --cosmic-purple-hover:  rgba(124,58,237,0.12);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        .sr-only {
            position: absolute !important;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0,0,0,0);
            white-space: nowrap; border: 0;
        }
        body {
            overflow: hidden;
            background: #000;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-font-smoothing: antialiased;
        }
        canvas {
            display: block;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #space-close {
            position: absolute;
            top: 1.1rem; left: 1.5rem;
            z-index: 200;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0.25rem 0.4rem;
            transition: color 0.2s;
            outline: none;
        }
        #space-close:focus-visible {
            outline: 2px solid var(--cosmic-purple);
            outline-offset: 3px;
            border-radius: 4px;
        }
        @media (hover:hover) and (pointer:fine) {
            #space-close:hover { color: var(--cosmic-purple); }
        }

        #start-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; gap: 28px;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(2px);
        }
        #start-btn {
            background: var(--card);
            color: var(--cosmic-purple);
            border: 1px solid var(--cosmic-purple-border);
            padding: 0.6rem 2.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            border-radius: 999px;
            cursor: pointer;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: background 0.2s, border-color 0.2s;
        }
        @media (hover:hover) and (pointer:fine) {
            #start-btn:hover {
                background: var(--cosmic-purple-hover);
                border-color: var(--cosmic-purple);
            }
        }
        .hint {
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-align: center;
            line-height: 2.2;
        }
        .kbd {
            display: inline-block;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.08em;
        }

        #nasa-panel {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 150;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s;
        }
        #nasa-panel.visible { opacity: 1; }
        .nasa-card {
            background: var(--card);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            min-width: 200px;
            max-width: 260px;
        }
        .nasa-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }
        .nasa-value {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            color: var(--text-muted);
            line-height: 1.7;
        }
        .nasa-value span.hi {
            color: var(--text-main);
            font-weight: 500;
        }
        .dot {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
            background: #44bb77;
        }
        .dot.warn  { background: #f59e0b; }
        .dot.alert { background: #ef4444; }

        #hud {
            position: absolute;
            top: calc(1rem + env(safe-area-inset-top, 0px));
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            display: none;
            align-items: center;
            gap: 0.9rem;
            padding: 0.45rem 0.9rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 999px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            pointer-events: none;
            font-size: 0.62rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        #hud.visible { display: flex; }
        #hud .hud-sep {
            width: 1px; height: 14px;
            background: var(--border);
        }
        #hud-throttle {
            position: relative;
            width: 6px; height: 40px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
        }
        #hud-throttle-fill {
            position: absolute; left: 0; right: 0; bottom: 0;
            height: calc(var(--t, 0) * 100%);
            background: linear-gradient(to top, #7C3AED, #b58cff);
            transition: height 0.08s linear;
        }
        #hud-throttle.aft::after {
            content: "";
            position: absolute; inset: -2px;
            border-radius: 4px;
            border: 1px solid rgba(255,120,80,0.7);
            box-shadow: 0 0 8px rgba(255,120,80,0.6);
            pointer-events: none;
        }
        .hud-val { color: var(--text-main); font-weight: 500; letter-spacing: 0.12em; }

        #mobile-throttle {
            position: absolute;
            bottom: calc(1.2rem + env(safe-area-inset-bottom, 0px));
            left: calc(1rem + env(safe-area-inset-left, 0px));
            z-index: 160;
            width: 40px; height: 160px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            display: none;
            touch-action: none;
        }
        #mobile-throttle.visible { display: block; }
        #mobile-throttle-track {
            position: absolute;
            left: 50%; top: 10px; bottom: 10px;
            width: 4px;
            margin-left: -2px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        #mobile-throttle-fill {
            position: absolute; left: 0; right: 0; bottom: 0;
            height: calc(var(--t, 0) * 100%);
            background: linear-gradient(to top, #7C3AED, #b58cff);
        }
        #mobile-throttle-thumb {
            position: absolute;
            left: 4px; right: 4px;
            height: 22px;
            border-radius: 11px;
            background: var(--cosmic-purple);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            bottom: calc(var(--t, 0) * (100% - 32px) + 5px);
            pointer-events: none;
        }

        #settings-btn {
            position: absolute;
            top: 1.05rem; right: 1.5rem;
            z-index: 200;
            width: 32px; height: 32px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        #settings-btn:focus-visible {
            outline: 2px solid var(--cosmic-purple);
            outline-offset: 3px;
            border-radius: 6px;
        }
        @media (hover:hover) and (pointer:fine) {
            #settings-btn:hover { color: var(--cosmic-purple); }
        }
        #settings-btn svg { width: 20px; height: 20px; }

        #settings-modal {
            color: var(--text-main);
            background: rgba(14, 12, 24, 0.92);
            border: 1px solid var(--cosmic-purple-border);
            border-radius: 14px;
            padding: 1.4rem 1.6rem;
            min-width: 300px;
            max-width: 92vw;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        #settings-modal::backdrop { background: rgba(0,0,0,0.6); }
        #settings-modal h2 {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            margin-bottom: 1.1rem;
            color: var(--text-main);
        }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.75rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
        }
        .settings-row label { flex: 1; }
        .settings-row input[type=range] { width: 130px; accent-color: var(--cosmic-purple); }
        .settings-row select {
            background: var(--card);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.25rem 0.4rem;
            font-family: inherit;
            font-size: 0.7rem;
        }
        .settings-note {
            font-size: 0.58rem;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            margin-top: 0.8rem;
            line-height: 1.6;
        }
        .settings-close {
            margin-top: 1rem;
            width: 100%;
            background: var(--card);
            color: var(--cosmic-purple);
            border: 1px solid var(--cosmic-purple-border);
            padding: 0.5rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
        }

        @media (prefers-reduced-motion: reduce) {
            #nasa-panel { transition: none; }
        }

        @media (max-width: 768px) {
            #nasa-panel {
                bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
                right: calc(0.75rem + env(safe-area-inset-right, 0px));
                gap: 0.35rem;
            }
            .nasa-card {
                min-width: 140px;
                max-width: 165px;
                padding: 0.55rem 0.75rem;
                border-radius: 0.6rem;
            }
            .nasa-label { font-size: 0.62rem; margin-bottom: 0.2rem; }
            .nasa-value { font-size: 0.7rem;  line-height: 1.55; }
            .nasa-value .sub { display: none; }
            #start-btn { font-size: 0.75rem; padding: 0.75rem 2.8rem; }
            .hint { font-size: 0.7rem; }
            #hud {
                top: calc(0.5rem + env(safe-area-inset-top, 0px));
                gap: 0.55rem;
                padding: 0.35rem 0.7rem;
                font-size: 0.58rem;
            }
            #hud-throttle { height: 32px; }
            #settings-btn { top: 0.7rem; right: 0.9rem; }
        }

        @media (max-width: 1024px) and (orientation: landscape) and (max-height: 500px) {
            #nasa-panel {
                bottom: 0.4rem;
                right: calc(0.4rem + env(safe-area-inset-right, 0px));
                gap: 0.25rem;
            }
            .nasa-card {
                min-width: 120px;
                max-width: 140px;
                padding: 0.4rem 0.55rem;
                border-radius: 0.5rem;
            }
            .nasa-label { font-size: 0.5rem;  margin-bottom: 0.15rem; }
            .nasa-value  { font-size: 0.55rem; line-height: 1.45; }
            #space-close { top: 0.5rem; left: 0.75rem; }
            #mobile-throttle { width: 34px; height: 110px; bottom: 0.5rem; left: 0.5rem; }
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
    </script>
</head>
<body>

<button id="space-close">&#8592;&ensp;Return</button>
<button id="settings-btn" aria-label="Scene settings" title="Scene settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"></path>
    </svg>
</button>

<div id="scene-status" role="status" aria-live="polite" class="sr-only"></div>

<div id="start-overlay">
    <button id="start-btn">Initiate</button>
    <div class="hint" id="thrust-hint"></div>
</div>

<div id="hud" aria-hidden="true">
    <div id="hud-throttle"><div id="hud-throttle-fill"></div></div>
    <div><span class="hud-lbl">VEL</span> <span class="hud-val" id="hud-vel">0</span></div>
    <div class="hud-sep"></div>
    <div><span class="hud-lbl">EARTH</span> <span class="hud-val" id="hud-earth">—</span></div>
    <div class="hud-sep"></div>
    <div><span class="hud-lbl">MOON</span> <span class="hud-val" id="hud-moon">—</span></div>
</div>

<div id="mobile-throttle" aria-hidden="true" role="slider" aria-label="Throttle" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div id="mobile-throttle-track"><div id="mobile-throttle-fill"></div></div>
    <div id="mobile-throttle-thumb"></div>
</div>

<dialog id="settings-modal" aria-label="Scene settings">
    <h2>Scene Settings</h2>
    <div class="settings-row">
        <label for="s-quality">Quality</label>
        <select id="s-quality">
            <option value="low">Low</option>
            <option value="med">Medium</option>
            <option value="high">High</option>
        </select>
    </div>
    <div class="settings-row">
        <label for="s-bloom">Bloom</label>
        <input type="range" id="s-bloom" min="0" max="2" step="0.05">
    </div>
    <div class="settings-row">
        <label for="s-density">Star density</label>
        <input type="range" id="s-density" min="0.3" max="1.5" step="0.05">
    </div>
    <div class="settings-row">
        <label for="s-reduced">Reduce motion</label>
        <input type="checkbox" id="s-reduced">
    </div>
    <div class="settings-row">
        <label for="s-stretch">Thrust stretch</label>
        <input type="checkbox" id="s-stretch">
    </div>
    <div class="settings-row">
        <label for="s-hud">Show HUD</label>
        <input type="checkbox" id="s-hud">
    </div>
    <div class="settings-note" id="s-note"></div>
    <button class="settings-close" id="s-close" type="button">Close</button>
</dialog>

<div id="nasa-panel">
    <div class="nasa-card">
        <div class="nasa-label">Solar Activity</div>
        <div class="nasa-value" id="val-flare" aria-live="polite">Loading&hellip;</div>
    </div>
    <div class="nasa-card">
        <div class="nasa-label">Geomagnetic Storm</div>
        <div class="nasa-value" id="val-storm" aria-live="polite">Loading&hellip;</div>
    </div>
    <div class="nasa-card">
        <div class="nasa-label">Near-Earth Object</div>
        <div class="nasa-value" id="val-neo" aria-live="polite">Loading&hellip;</div>
    </div>
</div>

<script>
(function(){
    window.isMobile = window.matchMedia('(pointer: coarse) and (hover: none)').matches;
    var el = document.getElementById('thrust-hint');
    if (window.isMobile) {
        el.innerHTML = 'Tap & hold to thrust<br>Drag throttle to cruise';
    } else {
        el.innerHTML = 'Hold <span class="kbd">Space</span> to thrust &nbsp; <span class="kbd">+</span>/<span class="kbd">-</span> throttle';
    }
    document.addEventListener('touchstart', function(e){
        if(e.touches.length > 1) e.preventDefault();
    }, { passive: false });
})();
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }      from 'three/addons/postprocessing/ShaderPass.js';

document.getElementById('space-close').addEventListener('click', () => { window.location = 'index.html'; });

const isMobile = window.isMobile;

// ── settings, accessibility, helpers ────────────────────────────────
const SETTINGS_KEY = 'space_settings_v1';
const QUALITY_PRESETS = {
    low:  { far: 600,  mid: 400,  near: 200, octaves: 3, bloom: 0,   dpr: 1.5 },
    med:  { far: 1400, mid: 1000, near: 500, octaves: 5, bloom: 0.7, dpr: 2   },
    high: { far: 2200, mid: 1500, near: 700, octaves: 6, bloom: 0.9, dpr: 2   }
};
const DEFAULT_SETTINGS = {
    quality: isMobile ? 'low' : 'med',
    bloom: null,         // null => use preset default
    density: 1.0,
    reduced: false,
    stretch: true,
    hud: true
};
function loadSettings(){
    try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return { ...DEFAULT_SETTINGS };
        return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
    } catch(e) { return { ...DEFAULT_SETTINGS }; }
}
function saveSettings(s){
    try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch(e) {}
}
const settings = loadSettings();
const preset = QUALITY_PRESETS[settings.quality] || QUALITY_PRESETS.med;

const prefersReducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
let reducedMotion = prefersReducedMotion || settings.reduced;

const statusEl = document.getElementById('scene-status');
let announceTimer = 0;
function announce(msg){
    if (!statusEl) return;
    // throttle so we don't spam screen readers
    const now = performance.now();
    if (now - announceTimer < 400) return;
    announceTimer = now;
    statusEl.textContent = msg;
}
function vibrate(pattern){
    if (reducedMotion) return;
    try { navigator.vibrate && navigator.vibrate(pattern); } catch(e) {}
}

// NASA DEMO_KEY is intentionally public — rate-limited to 30 req/hour per IP by NASA
const KEY = 'DEMO_KEY';
const today = new Date();
const fmt = d => d.toISOString().split('T')[0];
const d7 = new Date(today); d7.setDate(d7.getDate() - 7);
const todayStr = fmt(today), d7Str = fmt(d7);

function setVal(id, html) { document.getElementById(id).innerHTML = html; }
const sub = html => isMobile ? '' : `<span class="sub">${html}</span>`;

function cachedFetch(label, url) {
    const cacheKey = 'nasa_' + todayStr + '_' + label;
    try {
        const cached = localStorage.getItem(cacheKey);
        if (cached) return Promise.resolve(JSON.parse(cached));
    } catch(e) {}
    return fetch(url)
        .then(r => r.json())
        .then(data => {
            try { localStorage.setItem(cacheKey, JSON.stringify(data)); } catch(e) {}
            try {
                Object.keys(localStorage)
                    .filter(k => k.startsWith('nasa_') && !k.startsWith('nasa_' + todayStr))
                    .forEach(k => localStorage.removeItem(k));
            } catch(e) {}
            return data;
        });
}

cachedFetch('flr', `https://api.nasa.gov/DONKI/FLR?startDate=${d7Str}&endDate=${todayStr}&api_key=${KEY}`)
    .then(data => {
        if (!data || !data.length) {
            setVal('val-flare', `<span class="dot"></span><span class="hi">Quiet</span>${sub(' &mdash; no flares in 7 days')}`);
            return;
        }
        const last  = data[data.length - 1];
        const cls   = last.classType || '?';
        const when  = last.beginTime ? last.beginTime.slice(0, 10) : '';
        const level = cls.startsWith('X') ? 'alert' : cls.startsWith('M') ? 'warn' : '';
        setVal('val-flare',
            `<span class="dot ${level}"></span><span class="hi">Class ${cls}</span> flare
             ${sub(`<br>${when} &mdash; ${data.length} event${data.length > 1 ? 's' : ''} this week`)}`);
    })
    .catch(() => setVal('val-flare', '<span class="dot warn"></span>Unavailable'));

cachedFetch('gst', `https://api.nasa.gov/DONKI/GST?startDate=${d7Str}&endDate=${todayStr}&api_key=${KEY}`)
    .then(data => {
        if (!data || !data.length) {
            setVal('val-storm', `<span class="dot"></span><span class="hi">None</span>${sub(' in past 7 days')}`);
            return;
        }
        const last  = data[data.length - 1];
        const kpMax = last.allKpIndex ? Math.max(...last.allKpIndex.map(k => k.kpIndex)) : '?';
        const kpStr = kpMax !== '?' ? kpMax.toFixed(1) : '?';
        const level = kpMax >= 7 ? 'alert' : kpMax >= 5 ? 'warn' : '';
        const when  = last.startTime ? last.startTime.slice(0, 10) : '';
        setVal('val-storm',
            `<span class="dot ${level}"></span>Kp <span class="hi">${kpStr}</span> peak
             ${sub(`<br>${when} &mdash; ${data.length} storm${data.length > 1 ? 's' : ''} this week`)}`);
    })
    .catch(() => setVal('val-storm', '<span class="dot warn"></span>Unavailable'));

cachedFetch('neo', `https://api.nasa.gov/neo/rest/v1/feed?start_date=${d7Str}&end_date=${todayStr}&api_key=${KEY}`)
    .then(data => {
        const total = data.element_count || 0;
        let closest = null, minDist = Infinity;
        Object.values(data.near_earth_objects || {}).forEach(day => {
            day.forEach(neo => {
                const dist = parseFloat(neo.close_approach_data?.[0]?.miss_distance?.lunar ?? Infinity);
                if (dist < minDist) { minDist = dist; closest = neo; }
            });
        });
        if (!closest) {
            setVal('val-neo', `<span class="dot"></span><span class="hi">${total}</span>${sub(' tracked this week')}`);
            return;
        }
        const name      = closest.name.replace(/[()]/g, '').trim();
        const lunarDist = minDist.toFixed(1);
        const hazard    = closest.is_potentially_hazardous_asteroid;
        const level     = hazard ? 'warn' : '';
        const diam      = closest.estimated_diameter?.meters;
        const diamStr   = diam ? `${Math.round(diam.estimated_diameter_min)}–${Math.round(diam.estimated_diameter_max)} m` : '';
        setVal('val-neo',
            `<span class="dot ${level}"></span><span class="hi">${name}</span>
             ${sub(`<br>${lunarDist} LD away &mdash; ${diamStr}<br><span style="opacity:.55;font-size:0.6rem;">${total} objects tracked this week</span>`)}`);
    })
    .catch(() => setVal('val-neo', '<span class="dot warn"></span>Unavailable'));

// ── sky shader ──────────────────────────────────────────────────
const SKY_VS = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`;
const SKY_FS_TPL = `
  uniform float uTime; uniform float uAspect; varying vec2 vUv;
  float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
  vec2 hash2(vec2 p){
    return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);
  }
  float noise(vec2 p){
    vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
    return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
  }
  float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<__OCTAVES__;i++){v+=a*noise(p);p*=2.1;a*=0.5;} return v; }
  vec2 rot(vec2 p, float a){ float c=cos(a),s=sin(a); return mat2(c,-s,s,c)*p; }
  void main(){
    vec2 uv = vUv;
    uv.x = (uv.x - 0.5) * uAspect + 0.5;

    float t = uTime * 0.018;
    vec2 ruv = rot(uv - 0.5, uTime * 0.004) + 0.5;

    vec2 w = vec2(fbm(ruv*1.5 + vec2(t, -t*0.5)),
                  fbm(ruv*1.5 + vec2(-t*0.7, t*0.9)));
    float n1 = fbm(ruv*2.8 + w*1.2 + vec2(t, t*0.6));
    float n2 = fbm(ruv*4.2 - w*0.7 - vec2(t*0.7, t*1.1));
    float n3 = fbm(ruv*1.6 + w*0.4 + vec2(-t*0.4, t*0.9));

    vec3 col = vec3(0.005, 0.018, 0.014);
    col = mix(col, vec3(0.04, 0.22, 0.12), clamp(n1*1.4, 0.0, 1.0));
    col = mix(col, vec3(0.08, 0.55, 0.28), clamp(n2*0.7, 0.0, 1.0));
    col = mix(col, vec3(0.18, 0.06, 0.38), clamp(n3*0.5, 0.0, 1.0));
    col = mix(col, vec3(0.0,  0.45, 0.30), clamp(n1*n2*1.8, 0.0, 1.0));

    for (int i = 0; i < 5; i++) {
      vec2 seed = vec2(float(i)*7.13, float(i)*3.71);
      vec2 c = hash2(seed) * vec2(uAspect, 1.0);
      float d = length(uv - c);
      float pulse = 0.45 + 0.55 * sin(uTime * 0.25 + float(i) * 1.7);
      vec3 tint = mix(vec3(0.9, 0.6, 1.0), vec3(0.6, 1.0, 0.8), hash(seed));
      col += tint * smoothstep(0.11, 0.0, d) * pulse * 0.55;
    }

    float r = 1.0 - length(vUv - 0.5) * 1.1;
    col += vec3(0.08, 0.55, 0.28) * clamp(r * 0.18, 0.0, 0.18);

    gl_FragColor = vec4(col, 1.0);
  }
`;
const SKY_FS = SKY_FS_TPL.replace('__OCTAVES__', String(preset.octaves));
const skyUniforms = { uTime:{ value:0 }, uAspect:{ value: innerWidth/innerHeight } };
const skyScene  = new THREE.Scene();
const skyCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

      void main(){ vec4 c=texture2D(tDiffuse,vUv); vec2 uv=(vUv-0.5)*2.0;

        uniform vec3 uColor; varying vec3 vN; varying vec3 vV;
        void main(){
            float f = 1.0 - clamp(dot(vN, vV), 0.0, 1.0);
            float rim = pow(f, 2.4);
            gl_FragColor = vec4(uColor, rim * 0.9);

    `,
    transparent: true,

});

// ── stars: three parallax tiers sharing one shader material ───────
function getPortraitScale() { return Math.max(1, innerHeight / innerWidth); }

const STAR_COLS = [
    [1.0, 1.0, 1.0], [0.7, 0.9, 1.0], [1.0, 0.95, 0.8],
    [0.6, 1.0, 0.75], [0.9, 0.7, 1.0]
];
const NEAR_TINT = [0.35, 0.85, 0.55]; // green-ish, absorbs old dust

const density = settings.density || 1.0;
const TIER_CONFIGS = [
    { name: 'far',  count: Math.round(preset.far  * density), zNear: -12000, zFar: -6000,  xSpread: 2800, ySpread: 2000, size: 1.4, speedMult: 0.18, brightMin: 0.2, brightMax: 0.6, nearTint: 0 },
    { name: 'mid',  count: Math.round(preset.mid  * density), zNear: -6000,  zFar: -1500,  xSpread: 2000, ySpread: 1400, size: 2.0, speedMult: 0.55, brightMin: 0.4, brightMax: 0.9, nearTint: 0 },
    { name: 'near', count: Math.round(preset.near * density), zNear: -1500,  zFar: -50,    xSpread: 900,  ySpread: 700,  size: 2.6, speedMult: 1.0,  brightMin: 0.7, brightMax: 1.0, nearTint: 1 }
];

const starShared = {
    uTime:    { value: 0 },
    uStretch: { value: 1 },
    uPixelRatio: { value: renderer.getPixelRatio() },
    uTwinkleAmp: { value: reducedMotion ? 0.0 : 0.35 }
};

const STAR_VS = `
    attribute float aSize;
    attribute float aBrightness;
    attribute float aPhase;
    attribute float aNear;
    varying vec3  vColor;
    varying float vBright;
    varying float vPhase;
    uniform float uTime;
    uniform float uStretch;
    uniform float uPixelRatio;
    void main(){
        vColor  = color;
        vBright = aBrightness;
        vPhase  = aPhase;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        float dist = max(1.0, -mv.z);
        float size = aSize * uPixelRatio * (300.0 / dist);
        // stretch near-tier stars along screen-Y when thrusting
        size *= 1.0 + uStretch * aNear * 0.4;
        gl_PointSize = size;
        gl_Position = projectionMatrix * mv;
    }
`;
const STAR_FS = `
    varying vec3  vColor;
    varying float vBright;
    varying float vPhase;
    uniform float uTime;
    uniform float uTwinkleAmp;
    void main(){
        vec2 d = gl_PointCoord - 0.5;
        float r = length(d) * 2.0;
        float core = smoothstep(1.0, 0.0, r);
        float halo = smoothstep(1.0, 0.6, r) * 0.35;
        float a = core + halo;
        if (a < 0.02) discard;
        float tw = 1.0 + uTwinkleAmp * sin(uTime * 1.8 + vPhase);
        gl_FragColor = vec4(vColor * vBright * tw, a);
    }
`;

function makeStarTier(cfg){
    const ps = getPortraitScale();
    const pos  = new Float32Array(cfg.count * 3);
    const col  = new Float32Array(cfg.count * 3);
    const sz   = new Float32Array(cfg.count);
    const br   = new Float32Array(cfg.count);
    const ph   = new Float32Array(cfg.count);
    const near = new Float32Array(cfg.count);
    for (let i = 0; i < cfg.count; i++){
        pos[i*3]   = (Math.random() - 0.5) * cfg.xSpread;
        pos[i*3+1] = (Math.random() - 0.5) * cfg.ySpread * ps;
        pos[i*3+2] = cfg.zNear + Math.random() * (cfg.zFar - cfg.zNear);
        const useTint = cfg.nearTint && Math.random() < 0.35;
        const c = useTint ? NEAR_TINT : STAR_COLS[Math.floor(Math.random() * STAR_COLS.length)];
        col[i*3]   = c[0]; col[i*3+1] = c[1]; col[i*3+2] = c[2];
        sz[i]   = cfg.size * (0.7 + Math.random() * 0.6);
        br[i]   = cfg.brightMin + Math.random() * (cfg.brightMax - cfg.brightMin);
        ph[i]   = Math.random() * Math.PI * 2;
        near[i] = cfg.nearTint;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position',    new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',       new THREE.BufferAttribute(col, 3));
    geo.setAttribute('aSize',       new THREE.BufferAttribute(sz, 1));
    geo.setAttribute('aBrightness', new THREE.BufferAttribute(br, 1));
    geo.setAttribute('aPhase',      new THREE.BufferAttribute(ph, 1));
    geo.setAttribute('aNear',       new THREE.BufferAttribute(near, 1));
    const mat = new THREE.ShaderMaterial({
        uniforms: starShared,
        vertexShader: STAR_VS,
        fragmentShader: STAR_FS,
        vertexColors: true,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
    });
    const points = new THREE.Points(geo, mat);
    scene.add(points);
    return { points, geo, cfg };
}

const starTiers = TIER_CONFIGS.map(makeStarTier);

// ── input: analog thrust ─────────────────────────────────────────────
let started = false;
let setpoint = 1.0;    // speed multiplier [0,1] — sets how fast when pressing
let afterburner = 0;   // spacebar / canvas-tap [0 or 1] — required to actually thrust
const SP_STEP = 0.1;

function setSetpoint(v, sourceAnnounce){
    const nv = Math.max(0, Math.min(1, v));
    if (Math.abs(nv - setpoint) < 0.001) return;
    const prev = setpoint;
    setpoint = nv;
    if (sourceAnnounce) announce('Throttle ' + Math.round(setpoint * 100) + ' percent');
    if ((prev > 0 && setpoint === 0) || (prev < 1 && setpoint === 1)) vibrate(15);
    syncMobileThrottleUI();
}

window.addEventListener('keydown', e => {
    if (!started) return;
    if (e.code === 'Space') {
        if (!afterburner) { afterburner = 1; vibrate(20); announce('Afterburner engaged'); }
        e.preventDefault();
    } else if (e.code === 'Equal' || e.code === 'NumpadAdd') {
        setSetpoint(setpoint + SP_STEP, true); e.preventDefault();
    } else if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
        setSetpoint(setpoint - SP_STEP, true); e.preventDefault();
    } else if (e.code === 'Digit0' || e.code === 'Numpad0') {
        setSetpoint(0, true); e.preventDefault();
    } else if (e.code === 'Escape') {
        // close settings if open — handled by dialog default
    }
});
window.addEventListener('keyup', e => {
    if (e.code === 'Space') afterburner = 0;
}, { passive: true });

window.addEventListener('wheel', e => {
    if (!started) return;
    // only adjust when pointer is over canvas (not over UI)
    if (e.target && e.target.closest && e.target.closest('button, dialog, #hud, #nasa-panel, #mobile-throttle')) return;
    setSetpoint(setpoint - e.deltaY * 0.0008, true);
    e.preventDefault();
}, { passive: false });

// Canvas-tap afterburner (pointerdown on the canvas only)
renderer.domElement.addEventListener('pointerdown', () => {
    if (!started) return;
    afterburner = 1; vibrate(20);
});
window.addEventListener('pointerup',     () => afterburner = 0);
window.addEventListener('pointercancel', () => afterburner = 0);
document.addEventListener('mouseleave',  () => afterburner = 0);

// Mobile throttle slider
const mobileThrottle = document.getElementById('mobile-throttle');
const mobileThumb = document.getElementById('mobile-throttle-thumb');
const mobileFill = document.getElementById('mobile-throttle-fill');
function syncMobileThrottleUI(){
    if (mobileThrottle) {
        mobileThrottle.style.setProperty('--t', setpoint);
        mobileThrottle.setAttribute('aria-valuenow', Math.round(setpoint * 100));
    }
}
if (isMobile && mobileThrottle) {
    let dragging = false;
    const updateFromY = clientY => {
        const r = mobileThrottle.getBoundingClientRect();
        const t = 1 - (clientY - r.top) / r.height;
        setSetpoint(t, false);
    };
    mobileThrottle.addEventListener('pointerdown', e => {
        dragging = true;
        mobileThrottle.setPointerCapture(e.pointerId);
        updateFromY(e.clientY);
        e.preventDefault();
    });
    mobileThrottle.addEventListener('pointermove', e => {
        if (!dragging) return;
        updateFromY(e.clientY);
    });
    const endDrag = e => {
        dragging = false;
        try { mobileThrottle.releasePointerCapture(e.pointerId); } catch(_){}
    };
    mobileThrottle.addEventListener('pointerup', endDrag);
    mobileThrottle.addEventListener('pointercancel', endDrag);
}

// ── HUD update ─────────────────────────────────────────────────────
const hudEl = document.getElementById('hud');
const hudVel = document.getElementById('hud-vel');
const hudEarth = document.getElementById('hud-earth');
const hudMoon = document.getElementById('hud-moon');

    hudMoon.textContent  = dm > 9999 ? (dm / 1000).toFixed(1) + 'k u' : Math.round(dm) + ' u';
}

// ── animate ────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let time = 0, starSpeed = 3, thrust = 0;
let rafId = null;

function animate(){
    rafId = requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), .05);
    time += dt;

    // Press required to thrust; setpoint controls how much thrust when pressed
    const thrustCmd = afterburner * setpoint;
    thrust = THREE.MathUtils.lerp(thrust, thrustCmd, dt * (thrustCmd > thrust ? 2.5 : 5.0));

    skyUniforms.uTime.value = time % 1000.0;
    starShared.uTime.value  = time % 1000.0;

    const targetSpeed = 3 + thrust * (960 - 3);
    starSpeed = THREE.MathUtils.lerp(starSpeed, targetSpeed, dt * (targetSpeed > starSpeed ? 2 : 4));

    const aspectMult = aspect < 1 ? Math.max(1, 1 / aspect) : 1;
    const effectiveSpeed = starSpeed * aspectMult;
    const ps = getPortraitScale();

    const stretchOn = settings.stretch && !reducedMotion;
    starShared.uStretch.value = stretchOn ? (thrust * 8) : 0;

    // advance each star tier
    for (const tier of starTiers) {
        const arr = tier.geo.attributes.position.array;
        const speed = effectiveSpeed * tier.cfg.speedMult;
        const step = speed * dt;
        const xSpread = tier.cfg.xSpread;
        const ySpread = tier.cfg.ySpread * ps;
        const zNear = tier.cfg.zNear;
        const zFar  = tier.cfg.zFar;
        const count = tier.cfg.count;
        for (let i = 0; i < count; i++) {
            const ix = i * 3;
            arr[ix + 2] += step;
            if (arr[ix + 2] > 55) {
                arr[ix]     = (Math.random() - 0.5) * xSpread;
                arr[ix + 1] = (Math.random() - 0.5) * ySpread;
                arr[ix + 2] = zNear + Math.random() * (zFar - zNear) * 0.2;
            }
        }
        tier.geo.attributes.position.needsUpdate = true;
    }

    moon.rotation.y   += 0.04 * dt;
    earth.rotation.y  += 0.02 * dt;
    clouds.rotation.y += 0.026 * dt;

    camera.fov = THREE.MathUtils.lerp(camera.fov, baseFOV + (thrust * 25), dt * 3);
    camera.updateProjectionMatrix();

    if (!reducedMotion && thrust > 0.1) {
        camera.position.x = (Math.random() - 0.5) * thrust * 0.2;
        camera.position.y = (Math.random() - 0.5) * thrust * 0.2;
    } else {
        camera.position.x = THREE.MathUtils.lerp(camera.position.x, 0, dt * 5);
        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 0, dt * 5);
    }

    if (bloomEnabled) {
        const bloomTarget = BLOOM_BASE * (reducedMotion ? 0.5 : 1.0) + thrust * 1.2;
        bloom.strength = THREE.MathUtils.lerp(bloom.strength, bloomTarget, dt * 5);
    }

    if ((hudFrame++ % 6) === 0) updateHUD(effectiveSpeed);

    composer.render();
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        cancelAnimationFrame(rafId);
        rafId = null;
        clock.stop();
    } else {
        clock.start();
        if (!rafId) rafId = requestAnimationFrame(animate);
    }
});

// ── settings modal wiring ──────────────────────────────────────────
const modal = document.getElementById('settings-modal');
const sBtn = document.getElementById('settings-btn');
const sQuality = document.getElementById('s-quality');
const sBloom = document.getElementById('s-bloom');
const sDensity = document.getElementById('s-density');
const sReduced = document.getElementById('s-reduced');
const sStretch = document.getElementById('s-stretch');
const sHud = document.getElementById('s-hud');
const sClose = document.getElementById('s-close');
const sNote = document.getElementById('s-note');

function syncSettingsUI(){
    sQuality.value = settings.quality;
    sBloom.value   = (settings.bloom != null) ? settings.bloom : preset.bloom;
    sDensity.value = settings.density;
    sReduced.checked = settings.reduced;
    sStretch.checked = settings.stretch;
    sHud.checked = settings.hud;
    sNote.textContent = 'Quality and density take effect after reload.';
}
syncSettingsUI();
syncMobileThrottleUI();

sBtn.addEventListener('click', () => {
    syncSettingsUI();
    if (typeof modal.showModal === 'function') modal.showModal();
    else modal.setAttribute('open', '');
});
sClose.addEventListener('click', () => {
    if (typeof modal.close === 'function') modal.close();
    else modal.removeAttribute('open');
});

sBloom.addEventListener('input', () => {
    settings.bloom = parseFloat(sBloom.value);
    if (bloomEnabled) bloom.strength = settings.bloom + thrust * 1.2;
    saveSettings(settings);
});
sReduced.addEventListener('change', () => {
    settings.reduced = sReduced.checked;
    reducedMotion = prefersReducedMotion || settings.reduced;
    starShared.uTwinkleAmp.value = reducedMotion ? 0 : 0.35;
    saveSettings(settings);
    announce(reducedMotion ? 'Reduced motion on' : 'Reduced motion off');
});
sStretch.addEventListener('change', () => {
    settings.stretch = sStretch.checked;
    saveSettings(settings);
});
sHud.addEventListener('change', () => {
    settings.hud = sHud.checked;
    saveSettings(settings);
    applyHudVisibility();
});
sQuality.addEventListener('change', () => {
    settings.quality = sQuality.value;
    saveSettings(settings);
});
sDensity.addEventListener('change', () => {
    settings.density = parseFloat(sDensity.value);
    saveSettings(settings);
});

animate();
</script>
