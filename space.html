<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Starship</title>
    //fonts.googleapis.com">
    //fonts.gstatic.com" crossorigin>
    //fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-muted: #a1a1aa;
            --border: rgba(255,255,255,0.08);
            --card: rgba(255,255,255,0.04);
            --cosmic-purple: #7C3AED;
        }
        body.light {
            --text-muted: #6b7280;
            --border: rgba(0,0,0,0.10);
            --card: rgba(0,0,0,0.05);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            overflow:hidden; background:#000;
            font-family:'Inter',sans-serif;
            touch-action:none; user-select:none;
            -webkit-font-smoothing:antialiased;
        }
        body.light { background:#1a2a3a; }
        #start-overlay {
            position:absolute; inset:0; display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            z-index:100; gap:28px;
            background:rgba(0,0,0,0.78); backdrop-filter:blur(2px);
        }
        body.light #start-overlay { background:rgba(20,35,55,0.86); }
        #overlay-title {
            font-size:11px; font-weight:500; letter-spacing:0.28em;
            text-transform:uppercase; color:var(--text-muted);
        }
        #start-btn {
            background:var(--card); color:var(--cosmic-purple);
            border:1px solid rgba(124,58,237,0.45);
            padding:10px 40px; font-family:'Inter',sans-serif;
            font-size:10px; font-weight:500; border-radius:999px; cursor:pointer;
            letter-spacing:0.28em; text-transform:uppercase;
            transition:background 0.2s,border-color 0.2s;
        }
        @media (hover:hover) and (pointer:fine){
            #start-btn:hover{ background:rgba(124,58,237,0.12); border-color:var(--cosmic-purple); }
        }
        .hint{ font-size:10px; color:var(--text-muted); letter-spacing:0.14em; text-align:center; line-height:2.2; }
        .kbd{
            display:inline-block; background:var(--card); border:1px solid var(--border);
            color:var(--text-muted); padding:1px 7px; border-radius:4px;
            font-size:9px; font-family:'Inter',sans-serif; letter-spacing:0.08em;
        }
        #space-close{
            position:absolute; top:20px; left:22px; z-index:200;
            background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif;
            font-size:10px; font-weight:400; letter-spacing:0.20em; text-transform:uppercase;
            color:var(--text-muted); padding:4px 0; transition:color 0.2s;
        }
        @media (hover:hover) and (pointer:fine){ #space-close:hover{ color:var(--cosmic-purple); } }
        #ui{
            position:absolute; bottom:24px; left:24px; color:var(--text-muted);
            font-size:10px; letter-spacing:0.14em; pointer-events:none;
            line-height:2.4; text-transform:uppercase; opacity:0.5;
        }
        @media (max-width:768px){ #ui{ display:none; } }
    </style>
    <script type="importmap">
    { "imports": {
        "three":          "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/":  "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
    </script>
</head>
<body>

<button id="space-close">&#8592;&ensp;Return</button>
<div id="start-overlay">
    <p id="overlay-title">Starship</p>
    <button id="start-btn">Initiate Flight</button>
    <div class="hint">
        Hold <span class="kbd">Space</span> to thrust &nbsp;&middot;&nbsp;
        <span class="kbd">W A S D</span> to steer
    </div>
</div>
<div id="ui">
    <div><span class="kbd">Space</span> &ensp; Main Engine</div>
    <div><span class="kbd">W S</span> &ensp; Pitch &nbsp;&middot;&nbsp; <span class="kbd">A D</span> &ensp; Roll</div>
</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }      from 'three/addons/postprocessing/ShaderPass.js';

const isDark = localStorage.getItem('space-theme') !== 'light';
if (!isDark) document.body.classList.add('light');
document.getElementById('space-close').addEventListener('click', () => window.close());

// ── renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = isDark ? 1.15 : 0.90;
document.body.appendChild(renderer.domElement);

// ── scene / camera ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const baseFOV = 56;
const camera = new THREE.PerspectiveCamera(baseFOV, innerWidth/innerHeight, 0.1, 80000);
camera.position.set(0, 5, 28);
camera.lookAt(0, 1, 0);

// ── sky shaders ───────────────────────────────────────────────────────────────
const SKY_VS = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`;
const SKY_FS_DARK = `
  uniform float uTime; varying vec2 vUv;
  float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
  float noise(vec2 p){
    vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
    return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
  }
  float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<6;i++){v+=a*noise(p);p*=2.1;a*=0.5;} return v; }
  void main(){
    float t=uTime*0.018;
    float n1=fbm(vUv*2.8+vec2(t,t*0.6));
    float n2=fbm(vUv*4.2-vec2(t*0.7,t*1.1));
    float n3=fbm(vUv*1.6+vec2(-t*0.4,t*0.9));
    vec3 col=vec3(0.005,0.018,0.014);
    col=mix(col,vec3(0.04,0.22,0.12),clamp(n1*1.4,0.0,1.0));
    col=mix(col,vec3(0.08,0.55,0.28),clamp(n2*0.7,0.0,1.0));
    col=mix(col,vec3(0.18,0.06,0.38),clamp(n3*0.5,0.0,1.0));
    col=mix(col,vec3(0.0,0.45,0.30),clamp(n1*n2*1.8,0.0,1.0));
    float r=1.0-length(vUv-0.5)*1.1;
    col+=vec3(0.08,0.55,0.28)*clamp(r*0.18,0.0,0.18);
    gl_FragColor=vec4(col,1.0);
  }
`;
const SKY_FS_LIGHT = `
  uniform float uTime; varying vec2 vUv;
  float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
  float noise(vec2 p){
    vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
    return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
  }
  float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<6;i++){v+=a*noise(p);p*=2.1;a*=0.5;} return v; }
  void main(){
    float t=uTime*0.012;
    float n1=fbm(vUv*2.2+vec2(t,t*0.5));
    float n2=fbm(vUv*3.5-vec2(t*0.6,t*0.9));
    vec3 col=vec3(0.08,0.13,0.22);
    col=mix(col,vec3(0.12,0.20,0.38),clamp(n1*1.2,0.0,1.0));
    col=mix(col,vec3(0.16,0.18,0.32),clamp(n2*0.8,0.0,1.0));
    col=mix(col,vec3(0.18,0.10,0.30),clamp(n1*n2*1.5,0.0,0.35));
    float r=1.0-length(vUv-0.5)*0.8;
    col+=vec3(0.10,0.15,0.28)*clamp(r*0.18,0.0,0.18);
    gl_FragColor=vec4(col,1.0);
  }
`;
const skyUniforms = { uTime:{ value:0 } };
const skyScene  = new THREE.Scene();
const skyCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
skyScene.add(new THREE.Mesh(
    new THREE.PlaneGeometry(2,2),
    new THREE.ShaderMaterial({
        uniforms:skyUniforms, vertexShader:SKY_VS,
        fragmentShader:isDark?SKY_FS_DARK:SKY_FS_LIGHT,
        depthWrite:false, depthTest:false
    })
));

// ── post-processing ───────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
const rpSky = new RenderPass(skyScene, skyCamera);
const rpMain = new RenderPass(scene, camera);
rpMain.clear = false;
composer.addPass(rpSky);
composer.addPass(rpMain);
const bloom = new UnrealBloomPass(
    new THREE.Vector2(innerWidth,innerHeight),
    isDark?1.1:0.25, 0.4, isDark?0.55:0.80
);
composer.addPass(bloom);
composer.addPass(new ShaderPass({
    uniforms:{ tDiffuse:{value:null}, d:{value:1.05}, o:{value:0.97} },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
    fragmentShader:`uniform sampler2D tDiffuse; uniform float d,o; varying vec2 vUv;
      void main(){ vec4 c=texture2D(tDiffuse,vUv); vec2 uv=(vUv-0.5)*2.0;
        gl_FragColor=vec4(c.rgb*clamp(o-d*dot(uv,uv),0.0,1.0),c.a); }`
}));

// ── lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(isDark?0x0d1a10:0x0d1830, isDark?2.0:1.2));
const sun = new THREE.DirectionalLight(0xfff8ee, isDark?7:6);
sun.position.set(600,250,300); scene.add(sun);
const fill = new THREE.DirectionalLight(isDark?0x1a4030:0x2244aa, isDark?1.5:1.0);
fill.position.set(-300,-80,-200); scene.add(fill);
const engineGlow = new THREE.PointLight(0x7C3AED, 0, 120);
scene.add(engineGlow);
const moonLight = new THREE.PointLight(0xfff4e0, isDark?3.0:2.0, 8000);
moonLight.position.set(600,250,-2800); scene.add(moonLight);

// ── moon ──────────────────────────────────────────────────────────────────────
const texLoader = new THREE.TextureLoader();
const moonMat = new THREE.MeshStandardMaterial({
    roughness:0.92, metalness:0.0, emissive:0x334455, emissiveIntensity:0.25
});
texLoader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg', t => {
    moonMat.map=t; moonMat.emissiveMap=t; moonMat.needsUpdate=true;
});
const moon = new THREE.Mesh(new THREE.SphereGeometry(110,80,80), moonMat);
moon.position.set(0,0,-3200); scene.add(moon);

// ── earth ─────────────────────────────────────────────────────────────────────
const earth = new THREE.Mesh(
    new THREE.SphereGeometry(48,40,40),
    new THREE.MeshStandardMaterial({color:0x1a4d8a,roughness:0.75})
);
earth.position.set(-820,220,-5000); scene.add(earth);
earth.add(new THREE.Mesh(
    new THREE.SphereGeometry(51,40,40),
    new THREE.MeshStandardMaterial({color:0x33aaff,transparent:true,opacity:0.10,side:THREE.FrontSide})
));

// ── stars ─────────────────────────────────────────────────────────────────────
const STARS = isDark?2400:1600;
const sGeo=new THREE.BufferGeometry();
const sP=new Float32Array(STARS*6), sC=new Float32Array(STARS*6);
const SCOLS=isDark?[[1,1,1],[0.7,0.9,1],[1,0.95,0.8],[0.6,1,0.75],[0.9,0.7,1]]:[[1,1,1],[0.8,0.9,1],[1,0.95,0.7],[0.7,1,0.85]];
for(let i=0;i<STARS;i++){
    const x=(Math.random()-.5)*1400,y=(Math.random()-.5)*1000,z=(Math.random()-.5)*5000-500,ix=i*6;
    sP[ix]=x;sP[ix+1]=y;sP[ix+2]=z;sP[ix+3]=x;sP[ix+4]=y;sP[ix+5]=z;
    const c=SCOLS[Math.floor(Math.random()*SCOLS.length)];
    sC[ix]=c[0];sC[ix+1]=c[1];sC[ix+2]=c[2];sC[ix+3]=c[0];sC[ix+4]=c[1];sC[ix+5]=c[2];
}
sGeo.setAttribute('position',new THREE.BufferAttribute(sP,3));
sGeo.setAttribute('color',new THREE.BufferAttribute(sC,3));
const stars=new THREE.LineSegments(sGeo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:isDark?0.8:0.9}));
scene.add(stars);

// ── dust ──────────────────────────────────────────────────────────────────────
const dGeo=new THREE.BufferGeometry();
const dP=new Float32Array(700*3);
for(let i=0;i<700;i++){dP[i*3]=(Math.random()-.5)*350;dP[i*3+1]=(Math.random()-.5)*250;dP[i*3+2]=(Math.random()-.5)*900-100;}
dGeo.setAttribute('position',new THREE.BufferAttribute(dP,3));
const dust=new THREE.Points(dGeo,new THREE.PointsMaterial({color:isDark?0x44bb77:0x8899cc,size:0.15,transparent:true,opacity:isDark?0.28:0.20}));
scene.add(dust);

// ════════════════════════════════════════════════════════════════════════════
// ── SHIP ─────────────────────────────────────────────────────────────────────
// Cinematic sci-fi spaceship built in local Y-up space.
// Architecture:
//   • Sleek double-tapered fuselage (narrow waist, broad shoulders)
//   • Faceted command module / cockpit with glowing windows
//   • Swept dorsal spine ridge
//   • Two large swept wing strakes low on the hull
//   • Four outboard thruster nacelles (with their own mini-plumes)
//   • Central 3-bell main engine cluster flush to hull bottom
//   • Animated running lights (red/green/white)
// ════════════════════════════════════════════════════════════════════════════
const ship = new THREE.Group();

// ── materials ─────────────────────────────────────────────────────────────────
const mHull   = new THREE.MeshStandardMaterial({color:0xb0b8c8, metalness:0.88, roughness:0.22});
const mHullDk = new THREE.MeshStandardMaterial({color:0x22262e, metalness:0.80, roughness:0.40});
const mAccent = new THREE.MeshStandardMaterial({color:0x3a4560, metalness:0.70, roughness:0.50});
const mEngine = new THREE.MeshStandardMaterial({color:0x1e2230, metalness:0.96, roughness:0.14});
const mGlass  = new THREE.MeshStandardMaterial({color:0x7ec8e3, metalness:0.1,  roughness:0.05, transparent:true, opacity:0.82, emissive:0x2288cc, emissiveIntensity:0.9});
const mFlame  = new THREE.MeshBasicMaterial({color:0x7C3AED, transparent:true, opacity:0});
const mCore   = new THREE.MeshBasicMaterial({color:0xc4b5fd, transparent:true, opacity:0});
const mGlow   = new THREE.MeshBasicMaterial({color:0x7C3AED, transparent:true, opacity:0.55});
const mRedLight  = new THREE.MeshBasicMaterial({color:0xff2244, transparent:true, opacity:0.9});
const mGrnLight  = new THREE.MeshBasicMaterial({color:0x22ff88, transparent:true, opacity:0.9});
const mWhtLight  = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.9});

// ── geometry constants ────────────────────────────────────────────────────────
const BODY_MID_R  = 1.55;   // widest radius (shoulder)
const BODY_BOT_R  = 1.20;   // radius at engine skirt
const BODY_TOP_R  = 0.90;   // radius where cockpit module begins
const FUSELAGE_H  = 17.0;
const FUSELAGE_CY = 0.0;
const FUSELAGE_TOP = FUSELAGE_CY + FUSELAGE_H / 2;   // = +8.5
const FUSELAGE_BOT = FUSELAGE_CY - FUSELAGE_H / 2;   // = -8.5

// ── fuselage — double-tapered lathe ──────────────────────────────────────────
// Profile: wide at 30% height, tapers to narrower top & bottom
const fusePts = [];
const fuseSegs = 32;
for(let i=0;i<=fuseSegs;i++){
    const t  = i / fuseSegs;          // 0=bottom, 1=top
    const y  = FUSELAGE_BOT + t * FUSELAGE_H;
    // Smooth double-taper: peak radius around t=0.4
    const envelope = Math.pow(Math.sin(t * Math.PI), 0.55);
    const r = BODY_BOT_R + (BODY_MID_R - BODY_BOT_R) * envelope
              + (BODY_TOP_R - BODY_MID_R) * Math.max(0, t - 0.7) / 0.3;
    fusePts.push(new THREE.Vector2(Math.max(r, 0.05), y));
}
ship.add(new THREE.Mesh(new THREE.LatheGeometry(fusePts, 52), mHull));

// Dark underbelly panel (rear-facing arc)
ship.add(Object.assign(
    new THREE.Mesh(
        new THREE.LatheGeometry(fusePts.map(p => new THREE.Vector2(p.x + 0.018, p.y)), 52, 22,
            Math.PI * 0.08, Math.PI * 0.84),
        mHullDk
    )
));

// ── command module (cockpit block) ────────────────────────────────────────────
// Sits atop the fuselage — a flattened octagonal prism
const cmdGeo = new THREE.CylinderGeometry(0.72, 0.88, 1.8, 8, 1);
const cmd = new THREE.Mesh(cmdGeo, mAccent);
cmd.position.y = FUSELAGE_TOP + 0.9;
ship.add(cmd);

// Forward visor — wide panoramic window strip
const visorGeo = new THREE.BoxGeometry(1.1, 0.38, 0.12);
const visor = new THREE.Mesh(visorGeo, mGlass);
visor.position.set(0, FUSELAGE_TOP + 1.05, 0.84);
ship.add(visor);

// Two side windows
[-0.46, 0.46].forEach(x => {
    const w = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.28, 0.10), mGlass);
    w.position.set(x, FUSELAGE_TOP + 0.82, 0.82);
    w.rotation.y = x > 0 ? -0.38 : 0.38;
    ship.add(w);
});

// Nose cone atop command module — sharp ogive
const nosePts = [];
for(let i=0;i<=22;i++){
    const t = i/22;
    nosePts.push(new THREE.Vector2(Math.max(0.72*(1-Math.pow(t,1.6)), 0.015), t*4.2));
}
const nose = new THREE.Mesh(new THREE.LatheGeometry(nosePts, 32), mHull);
nose.position.y = FUSELAGE_TOP + 1.8;
ship.add(nose);

// ── dorsal spine ridge ────────────────────────────────────────────────────────
// A thin extruded fin running top-to-bottom along the back
const spineShape = new THREE.Shape();
spineShape.moveTo(0, 0);
spineShape.lineTo(0.08, 0.5);
spineShape.lineTo(0.06, FUSELAGE_H * 0.82);
spineShape.lineTo(0, FUSELAGE_H * 0.82);
spineShape.closePath();
const spineGeo = new THREE.ExtrudeGeometry(spineShape, {depth:0.05, bevelEnabled:false});
const spine = new THREE.Mesh(spineGeo, mAccent);
spine.rotation.x = -Math.PI / 2;
spine.position.set(-0.025, FUSELAGE_BOT, -BODY_MID_R - 0.04);
ship.add(spine);

// ── swept wing strakes ────────────────────────────────────────────────────────
// Large flat delta wings low on the hull
[-1, 1].forEach(side => {
    const wingShape = new THREE.Shape();
    wingShape.moveTo(0, 0);
    wingShape.lineTo(side * 3.8, -2.2);   // outer swept tip
    wingShape.lineTo(side * 3.2, -4.8);   // trailing edge tip
    wingShape.lineTo(side * 0.4, -3.6);   // root trailing
    wingShape.lineTo(0, -1.0);
    wingShape.closePath();
    const wingGeo = new THREE.ExtrudeGeometry(wingShape, {depth:0.14, bevelEnabled:true, bevelThickness:0.04, bevelSize:0.04, bevelSegments:2});
    const wing = new THREE.Mesh(wingGeo, mHull);
    // Position wings at lower body; extrude along Z, so rotate to lie flat
    wing.rotation.x = Math.PI / 2;
    wing.position.set(side * BODY_MID_R * 0.72, FUSELAGE_BOT + 4.0, 0.07);
    ship.add(wing);

    // Dark panel accent on wing surface
    const panelShape = new THREE.Shape();
    panelShape.moveTo(0, 0);
    panelShape.lineTo(side * 2.4, -1.4);
    panelShape.lineTo(side * 2.0, -3.2);
    panelShape.lineTo(side * 0.3, -2.4);
    panelShape.closePath();
    const panel = new THREE.Mesh(
        new THREE.ShapeGeometry(panelShape),
        mHullDk
    );
    panel.rotation.x = Math.PI / 2;
    panel.position.set(side * BODY_MID_R * 0.72 + side*0.02, FUSELAGE_BOT + 4.0, 0.22);
    ship.add(panel);
});

// ── outboard thruster nacelles ────────────────────────────────────────────────
// Four pods — two forward, two aft — mounted on short pylons
[
    { x: 2.2,  y: FUSELAGE_BOT + 5.8,  z:  0.0,  ry: 0.18 },
    { x:-2.2,  y: FUSELAGE_BOT + 5.8,  z:  0.0,  ry:-0.18 },
    { x: 1.6,  y: FUSELAGE_BOT + 1.4,  z:  0.0,  ry: 0.12 },
    { x:-1.6,  y: FUSELAGE_BOT + 1.4,  z:  0.0,  ry:-0.12 },
].forEach(({x, y, z, ry}) => {
    const pod = new THREE.Group();

    // Nacelle body — slim torpedo shape via lathe
    const nacPts = [];
    for(let i=0;i<=18;i++){
        const t = i/18;
        nacPts.push(new THREE.Vector2(Math.max(0.30 * Math.sin(t*Math.PI), 0.02), t*2.2 - 1.1));
    }
    pod.add(new THREE.Mesh(new THREE.LatheGeometry(nacPts, 20), mEngine));

    // Exhaust nozzle at nacelle bottom
    const noz = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.26, 0.4, 14), mEngine);
    noz.position.y = -1.3;
    pod.add(noz);

    // Mini-plume per nacelle
    const mp = new THREE.Mesh(new THREE.ConeGeometry(0.22, 3.5, 14), mFlame.clone());
    mp.position.y = -2.8;
    mp.rotation.x = Math.PI;
    mp.userData.isMiniPlume = true;
    pod.add(mp);

    // Pylon connecting nacelle to hull
    const pylon = new THREE.Mesh(
        new THREE.BoxGeometry(Math.abs(x) - BODY_MID_R + 0.1, 0.14, 0.22),
        mAccent
    );
    pylon.position.x = -x / 2;
    pod.add(pylon);

    pod.position.set(x, y, z);
    pod.rotation.y = ry;
    ship.add(pod);
});

// ── hull detail rings ──────────────────────────────────────────────────────────
[FUSELAGE_BOT + 3.5, FUSELAGE_BOT + 7.5, FUSELAGE_BOT + 11.5].forEach(ringY => {
    const r = new THREE.Mesh(
        new THREE.TorusGeometry(BODY_MID_R * 0.98, 0.04, 8, 52),
        mAccent
    );
    r.position.y = ringY;
    r.rotation.x = Math.PI / 2;
    ship.add(r);
});

// ── main engine cluster (3 bells, flush to hull bottom) ───────────────────────
const BELL_H  = 1.0;
const BELL_CY = FUSELAGE_BOT - BELL_H / 2;
[
    [0, 0], [0.65, 0], [-0.65, 0]
].forEach(([bx, bz]) => {
    const bell = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.36, BELL_H, 18), mEngine);
    bell.position.set(bx, BELL_CY, bz);
    ship.add(bell);
    const rim = new THREE.Mesh(
        new THREE.TorusGeometry(0.36, 0.04, 8, 22),
        new THREE.MeshBasicMaterial({color:0x1a1f2e})
    );
    rim.position.set(bx, FUSELAGE_BOT - BELL_H, bz);
    rim.rotation.x = Math.PI / 2;
    ship.add(rim);
});

// Engine exhaust ring glow disc (visible when thrusting)
const thrustRing = new THREE.Mesh(
    new THREE.RingGeometry(0.15, 1.05, 32),
    new THREE.MeshBasicMaterial({color:0x9966ff, transparent:true, opacity:0, side:THREE.DoubleSide})
);
thrustRing.position.y = FUSELAGE_BOT - BELL_H - 0.05;
thrustRing.rotation.x = Math.PI / 2;
ship.add(thrustRing);

// ── main plume & core ─────────────────────────────────────────────────────────
const PLUME_H  = 22;
const plume = new THREE.Mesh(new THREE.ConeGeometry(1.3, PLUME_H, 28), mFlame);
plume.position.y = FUSELAGE_BOT - BELL_H - PLUME_H / 2;
plume.rotation.x = Math.PI;
ship.add(plume);

const CORE_H = 16;
const core = new THREE.Mesh(new THREE.ConeGeometry(0.55, CORE_H, 16), mCore);
core.position.y = FUSELAGE_BOT - BELL_H - CORE_H / 2;
core.rotation.x = Math.PI;
ship.add(core);

// ── running lights ────────────────────────────────────────────────────────────
const lightGeo = new THREE.SphereGeometry(0.09, 8, 8);
const portLight  = new THREE.Mesh(lightGeo, mRedLight.clone());  // left = red
const stbdLight  = new THREE.Mesh(lightGeo, mGrnLight.clone());  // right = green
const noseLightM = new THREE.Mesh(lightGeo, mWhtLight.clone());  // nose = white strobe
portLight.position.set(-BODY_MID_R - 0.08, FUSELAGE_BOT + 5.5, 0);
stbdLight.position.set( BODY_MID_R + 0.08, FUSELAGE_BOT + 5.5, 0);
noseLightM.position.set(0, FUSELAGE_TOP + 5.8, 0);
ship.add(portLight, stbdLight, noseLightM);

const ENGINE_GLOW_LOCAL_Y = FUSELAGE_BOT - BELL_H;

ship.rotation.x = -Math.PI / 2;
scene.add(ship);

// ── input ─────────────────────────────────────────────────────────────────────
let started=false, thrusting=false;
const keys={w:false,a:false,s:false,d:false};
const baseRX=-Math.PI/2, maxT=0.38;
const tgt={x:baseRX,z:0};

window.addEventListener('keydown',e=>{
    if(!started) return;
    const k=e.key.toLowerCase();
    if(k in keys) keys[k]=true;
    if(e.code==='Space'){thrusting=true; e.preventDefault();}
});
window.addEventListener('keyup',e=>{
    const k=e.key.toLowerCase();
    if(k in keys) keys[k]=false;
    if(e.code==='Space') thrusting=false;
});
window.addEventListener('pointerdown',e=>{ if(started&&e.target.id!=='start-btn') thrusting=true; });
window.addEventListener('pointerup',  ()=>thrusting=false);
window.addEventListener('pointercancel',()=>thrusting=false);
window.addEventListener('deviceorientation',e=>{
    if(!started) return;
    tgt.x=baseRX+THREE.MathUtils.clamp((e.beta||0)/45,-1,1)*maxT;
    tgt.z=      -THREE.MathUtils.clamp((e.gamma||0)/45,-1,1)*maxT;
});

document.getElementById('start-btn').addEventListener('click',()=>{
    const ov=document.getElementById('start-overlay');
    ov.style.transition='opacity .4s'; ov.style.opacity='0';
    setTimeout(()=>ov.remove(),420);
    started=true;
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function')
        DeviceOrientationEvent.requestPermission().catch(()=>{});
});

window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    composer.setSize(innerWidth,innerHeight);
});

// ── animate ───────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
let time=0, starSpeed=3, thrust=0, moonSc=1;

function animate(){
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),.05);
    time+=dt;
    thrust=THREE.MathUtils.lerp(thrust,thrusting?1:0,dt*4.5);
    skyUniforms.uTime.value=time;

    if(started){
        if(keys.s)      tgt.x=THREE.MathUtils.lerp(tgt.x,baseRX+maxT,dt*7);
        else if(keys.w) tgt.x=THREE.MathUtils.lerp(tgt.x,baseRX-maxT,dt*7);
        else            tgt.x=THREE.MathUtils.lerp(tgt.x,baseRX,dt*4);
        if(keys.a)      tgt.z=THREE.MathUtils.lerp(tgt.z, maxT,dt*7);
        else if(keys.d) tgt.z=THREE.MathUtils.lerp(tgt.z,-maxT,dt*7);
        else            tgt.z=THREE.MathUtils.lerp(tgt.z,0,dt*4);
    }

    ship.rotation.x+=(tgt.x-ship.rotation.x)*6*dt;
    ship.rotation.z+=(tgt.z-ship.rotation.z)*6*dt;
    ship.rotation.y=Math.sin(time*.28)*.01;
    ship.position.x+=((-ship.rotation.z*14)-ship.position.x)*2.5*dt;
    ship.position.y+=((((baseRX-ship.rotation.x)*14)+Math.sin(time*1.7)*.55)-ship.position.y)*2.5*dt;

    const flk=.86+Math.random()*.14;
    mFlame.opacity =THREE.MathUtils.lerp(mFlame.opacity, thrust*.78*flk, dt*20);
    mCore.opacity  =THREE.MathUtils.lerp(mCore.opacity,  thrust*.96*flk, dt*20);
    thrustRing.material.opacity=THREE.MathUtils.lerp(thrustRing.material.opacity, thrust*.55*flk, dt*18);
    plume.scale.set(1, 1+thrust*.55*flk, 1);
    engineGlow.intensity=THREE.MathUtils.lerp(engineGlow.intensity,thrust*220*flk,dt*22);

    // Animate nacelle mini-plumes
    ship.traverse(obj=>{
        if(obj.userData.isMiniPlume){
            obj.material.opacity=THREE.MathUtils.lerp(obj.material.opacity,thrust*.45*flk,dt*18);
            obj.scale.set(1,1+thrust*.4*flk,1);
        }
    });

    // Running lights strobe
    const strobe = Math.sin(time * 4.5) > 0.6;
    noseLightM.material.opacity = strobe ? 0.95 : 0.1;
    portLight.material.opacity  = 0.6 + Math.sin(time*1.8)*0.35;
    stbdLight.material.opacity  = 0.6 + Math.sin(time*1.8+Math.PI)*0.35;

    const glowLocal=new THREE.Vector3(0,ENGINE_GLOW_LOCAL_Y,0);
    glowLocal.applyEuler(ship.rotation);
    engineGlow.position.set(ship.position.x+glowLocal.x,ship.position.y+glowLocal.y,ship.position.z+glowLocal.z);

    starSpeed=THREE.MathUtils.lerp(starSpeed,thrusting?960:3,dt*(thrusting?4:0.8));
    const str=starSpeed*.11;
    const pa=stars.geometry.attributes.position.array;
    for(let i=0;i<STARS;i++){
        const ix=i*6;
        pa[ix+2]+=starSpeed*dt;
        if(pa[ix+2]>55){
            const nz=-5000-Math.random()*600;
            pa[ix+2]=nz;pa[ix+5]=nz;
            pa[ix]=(Math.random()-.5)*1400;pa[ix+3]=pa[ix];
            pa[ix+1]=(Math.random()-.5)*1000;pa[ix+4]=pa[ix+1];
        }
        pa[ix+5]=pa[ix+2]-(0.7+str);
    }
    stars.geometry.attributes.position.needsUpdate=true;

    const da=dust.geometry.attributes.position.array;
    for(let i=0;i<700;i++){
        da[i*3+2]+=(starSpeed*.22+.8)*dt;
        if(da[i*3+2]>40) da[i*3+2]=-900-Math.random()*200;
    }
    dust.geometry.attributes.position.needsUpdate=true;

    if(thrust>.05) moonSc=Math.min(moonSc+thrust*0.18*dt,30);
    else           moonSc=THREE.MathUtils.lerp(moonSc,Math.max(moonSc-.001,1),dt*.4);
    moon.scale.setScalar(moonSc);
    moon.rotation.y+=.005*dt;
    earth.rotation.y+=.008*dt;

    camera.fov=THREE.MathUtils.lerp(camera.fov,baseFOV+thrust*18,dt*4);
    const sway=Math.sin(time*.38)*.07, shk=thrust*.2;
    camera.position.x=THREE.MathUtils.lerp(camera.position.x,(Math.random()-.5)*shk+sway,dt*10);
    camera.position.y=THREE.MathUtils.lerp(camera.position.y,5+(Math.random()-.5)*shk,dt*10);
    camera.updateProjectionMatrix();
    bloom.strength=THREE.MathUtils.lerp(bloom.strength,(isDark?1.1:0.25)+thrust*1.8,dt*5);

    composer.render();
}
animate();
</script>
</body>
