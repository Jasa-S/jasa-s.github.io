<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
    <meta name="description" content="Projects by Jasaman Saini: BlUE photo gallery, ORO golden hour planner, TIME milestone countdowns, SPACE star field, and Slow Walking.">
    <meta property="og:title" content="Projects — Jasaman Saini">
    <meta property="og:description" content="Project hub: BlUE, ORO, TIME, SPACE, Slow Walking, and about.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jasa-s.github.io/links.html">
    <meta name="twitter:card" content="summary">
    <script>(function(){try{var t=localStorage.getItem('theme'),d=t?t==='dark':matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
    <title>Projects</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" sizes="180x180" href="/blue-images/profileImage.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Helvetica+Neue:wght@700;900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="shared.css">
    <style>
        * { box-sizing: border-box; }
        .icon-globe { animation: none !important; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: background-color 0.3s ease, color 0.3s ease;
            max-width: 32rem;
            margin: 0 auto;
            padding: 4rem 1.5rem 0;
        }

        @media (hover: hover) and (pointer: fine) {
            #theme-toggle:hover { color: var(--cosmic-purple); transform: rotate(20deg) scale(1.2); }
        }

        .top-bar {
            position: absolute;
            top: 0.75rem;
            right: 1.25rem;
            display: flex;
            align-items: center;
            z-index: 500;
        }
        .top-bar .top-btn { padding: 0.35rem; min-width: unset; }

        .site-header {
            position: absolute;
            top: 0.85rem;
            left: 1.25rem;
            z-index: 500;
        }
        .header-h1 {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.75rem;
            font-weight: 900;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            margin: 0;
            color: var(--text-main);
            line-height: 1;
        }
        .header-h1 .quote { color: var(--text-muted); font-weight: 700; }
        @media (max-width: 480px) {
            .header-h1 { font-size: 1.4rem; }
        }

        .nav-link { text-decoration: none; display: block; color: inherit; }

        .photo-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1.25rem;
            transition: background 0.2s, transform 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        @media (hover: hover) and (pointer: fine) {
            .nav-link:hover .photo-card {
                background: var(--card-hover);
                border-color: rgba(125,125,125,0.3);
                transform: translateY(-2px);
            }
        }

        .card-text { display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }
        .card-title {
            font-size: 1.25rem; font-weight: 600;
            letter-spacing: -0.025em; margin: 0;
            display: flex; align-items: center;
        }
        .card-sub {
            font-size: 0.8125rem; color: var(--text-muted);
            margin: 0; padding-left: 2rem;
        }
        .arrow-icon { color: var(--text-muted); transition: transform 0.2s; font-size: 0.85rem; flex-shrink: 0; }
        .nav-link:hover .arrow-icon { transform: translateX(3px); }

        .links-stack { display: flex; flex-direction: column; gap: 0.75rem; }

        footer {
            padding: 1.5rem 0;
            margin-top: 3rem;
            border-top: 1px solid var(--timeline);
            text-align: center;
            color: var(--text-muted); font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: var(--ls-wide);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button id="theme-toggle" class="top-btn" aria-label="Toggle dark mode">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </div>

    <header class="site-header">
        <h1 class="header-h1"><span class="quote">&ldquo;</span>PROJECTS<span class="quote">&rdquo;</span></h1>
    </header>

    <main class="links-stack">
        <a href="index.html" class="nav-link" aria-label="Open About — resume and background">
            <div class="photo-card">
                <div class="card-text">
                    <h2 class="card-title"><span class="icon-globe">&#128100;</span>About</h2>
                    <p class="card-sub">Resume &amp; background</p>
                </div>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </div>
        </a>
        <a href="blue.html" class="nav-link" aria-label="Open BlUE photo gallery">
            <div class="photo-card">
                <div class="card-text">
                    <h2 class="card-title"><span class="icon-globe">&#127757;</span>BlUE</h2>
                    <p class="card-sub">Photo gallery</p>
                </div>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </div>
        </a>
        <a href="oro.html" class="nav-link" aria-label="Open ORO golden hour planner">
            <div class="photo-card">
                <div class="card-text">
                    <h2 class="card-title"><span class="icon-globe">&#127774;</span>ORO</h2>
                    <p class="card-sub">Golden hour planner</p>
                </div>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </div>
        </a>
        <a href="time.html" class="nav-link" aria-label="Open TIME milestone countdowns">
            <div class="photo-card">
                <div class="card-text">
                    <h2 class="card-title"><span class="icon-globe">&#8987;</span>TIME</h2>
                    <p class="card-sub">Milestones &amp; countdowns</p>
                </div>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </div>
        </a>
        <a href="space.html" class="nav-link" aria-label="Open SPACE interactive star field">
            <div class="photo-card">
                <div class="card-text">
                    <h2 class="card-title"><span class="icon-globe">&#128640;</span>SPACE</h2>
                    <p class="card-sub">Interactive star field</p>
                </div>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </div>
        </a>
        <a href="slow-walking.html" class="nav-link" aria-label="Open Slow Walking">
            <div class="photo-card">
                <div class="card-text">
                    <h2 class="card-title"><span class="icon-globe">&#128694;</span>Slow Walking</h2>
                    <p class="card-sub">Background walks &amp; music for studying</p>
                </div>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </div>
        </a>
    </main>

    <footer>
        <p style="margin:0;">&copy; <span id="copy-year"></span> Jasaman Saini</p>
    </footer>

    <script src="theme.js"></script>

</body>
</html>
