  - { ticker: GOOG, name: "Alphabet (C)", sector: "AI/Cloud", cost_basis_eur: 165.20, units: 5 }
  - { ticker: NBIS, name: "Nebius (A)",   sector: "AI Infra", cost_basis_eur: 38.50,  units: 11 }
