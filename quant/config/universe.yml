# Single source of truth for the quant model.
# Edit this file to change holdings or watchlist.
#
# cost_basis_eur and units are needed for the holdings to compute
# drawdown vs basis and weight, which feed the ADD/HOLD/TRIM logic.
# Approximate values are fine - update them as you trade.

