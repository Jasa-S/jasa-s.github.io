<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BlUE &mdash; a film and digital photography journal by Jasaman Saini.">
    <meta property="og:title" content="BlUE | Jasaman Saini">
    <meta property="og:description" content="A film and digital photography journal.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Jasa-S/jasa-s.github.io/main/blue-images/profileImage.png">
    <meta property="og:type" content="website">
    <title>BlUE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237C3AED'/><text y='.9em' font-size='72' x='50%' dominant-baseline='auto' text-anchor='middle' fill='white' font-family='Inter,sans-serif' font-weight='600'>J</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        :root {
            --bg: #ffffff; --text-main: #111827; --text-muted: #6b7280;
            --card: #f9fafb; --border: rgba(0,0,0,0.07);
            --cosmic-purple: #7C3AED; --timeline: #e5e7eb;
        }
        body.dark {
            --bg: #0a0a0a; --text-main: #ffffff; --text-muted: #a1a1aa;
            --card: #141414; --border: rgba(255,255,255,0.07); --timeline: #27272a;
        }
        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
        }
        a { color: inherit; }
        a:visited { color: inherit; }
        #sticky-bar {
            position: fixed; top: 1.1rem; left: 50%; transform: translateX(-50%);
            z-index: 500; display: flex; align-items: center; gap: 0.35rem;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 999px; padding: 0.3rem 0.55rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            transition: background 0.3s, border-color 0.3s; white-space: nowrap;
        }
        body.dark #sticky-bar { box-shadow: 0 2px 16px rgba(0,0,0,0.4); }
        .bar-divider { width:1px; height:14px; background:var(--border); margin:0 0.15rem; }
        .bar-back {
            display: inline-flex; align-items: center; gap: 0.35rem;
            color: var(--text-muted); font-size: 0.75rem; text-decoration: none;
            padding: 0.2rem 0.3rem; border-radius: 999px; transition: color 0.2s;
        }
        .bar-back .back-arrow { transition: transform 0.2s; }
        .bar-btn {
            background: none; border: none; border-radius: 999px;
            padding: 0.25rem 0.4rem; cursor: pointer; color: var(--text-muted);
            transition: color 0.2s; line-height: 1;
            display: flex; align-items: center; font-size: 0.85rem; font-family: inherit;
        }
        #page { max-width: 48rem; margin: 0 auto; padding: 5rem 1.5rem 0; }
        header { margin-bottom: 3rem; }
        header h1 {
            font-size: 1.875rem; font-weight: 500;
            letter-spacing: -0.025em;
            display: flex; align-items: center;
            margin: 0;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }
        @media (min-width: 640px) {
            .photo-grid { gap: 4px; grid-template-columns: repeat(4, 1fr); }
        }
        .grid-tile {
            aspect-ratio: 1 / 1; overflow: hidden;
            background: var(--card); position: relative; display: block;
            text-decoration: none;
        }
        .grid-tile img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .grid-tile-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0);
            transition: background 0.3s; display: flex; align-items: flex-end; padding: 0.6rem;
        }
        .grid-tile-label {
            color: white; font-size: 0.7rem; font-weight: 500;
            opacity: 0; transform: translateY(4px);
            transition: opacity 0.25s, transform 0.25s;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6); line-height: 1.3;
        }
        .grid-error {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }
        @media (hover: hover) and (pointer: fine) {
            .bar-back:hover { color: var(--cosmic-purple); }
            .bar-back:hover .back-arrow { transform: translateX(-2px); }
            .bar-btn:hover { color: var(--cosmic-purple); }
            .grid-tile:hover img { transform: scale(1.05); }
            .grid-tile:hover .grid-tile-overlay { background: rgba(0,0,0,0.28); }
            .grid-tile:hover .grid-tile-label { opacity: 1; transform: translateY(0); }
        }
        footer {
            padding: 1.5rem 0;
            margin-top: 3rem;
            border-top: 1px solid var(--timeline);
            display: flex; justify-content: space-between;
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 0.15em; color: var(--text-muted);
        }
        @keyframes spin-globe {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .icon-globe {
            display: inline-block;
            animation: spin-globe 8s linear infinite;
            margin-right: 0.5rem;
            font-style: normal;
        }
    </style>
</head>
<body>
    <div id="sticky-bar">
        <a href="index.html" class="bar-back">
            <i class="fa-solid fa-arrow-left back-arrow" style="font-size:0.7rem;"></i>
            <span>Back</span>
        </a>
        <div class="bar-divider"></div>
        <button class="bar-btn" id="theme-toggle" aria-label="Toggle dark mode">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </div>

    <div id="page">
        <header>
            <h1><span class="icon-globe">&#127757;</span>BlUE</h1>
        </header>
        <div class="photo-grid" id="grid"></div>
        <footer>
            <span>&copy; 2026 Jasaman Saini</span>
            <a href="index.html">Homepage</a>
        </footer>
    </div>

    <script>
    var bd   = document.body;
    var icon = document.getElementById('theme-icon');

    function applyTheme(dark) {
        bd.classList.toggle('dark', dark);
        icon.className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }
    var stored = localStorage.getItem('theme');
    if (stored) {
        applyTheme(stored === 'dark');
    } else {
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) applyTheme(e.matches);
    });
    document.getElementById('theme-toggle').addEventListener('click', function() {
        var isDark = bd.classList.toggle('dark');
        icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    fetch('posts.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var grid = document.getElementById('grid');
            var BASE = data.base;
            data.posts.forEach(function(p, i) {
                var src = BASE + p.imageId + '_' + p.thumb + '.jpg';
                var a   = document.createElement('a');
                a.className = 'grid-tile';
                a.href = 'blue-post.html#' + encodeURIComponent(p.id);
                a.innerHTML =
                    '<img src="' + esc(src) + '" alt="' + esc(p.title) + '"'
                    + (i === 0 ? '' : ' loading="lazy"')
                    + '>'
                    + '<div class="grid-tile-overlay"><div class="grid-tile-label">' + esc(p.title) + '</div></div>';
                grid.appendChild(a);
            });
        })
        .catch(function() {
            document.getElementById('grid').innerHTML =
                '<div class="grid-error">Could not load posts &mdash; please try again later.</div>';
        });
    </script>
</body>
</html>
