<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
    <script>(function(){try{var t=localStorage.getItem('theme'),d=t?t==='dark':matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
<title>BlUE</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" sizes="180x180" href="/blue-images/profileImage.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="shared.css">
    <style>
        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
        }
        /* Header: title on left, ORO link on right (parallel to index.html layout) */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 3rem;
        }
        header h1 {
            font-size: 1.75rem; font-weight: 600;
            letter-spacing: -0.025em;
            display: flex; align-items: center;
            margin: 0;
        }
        .oro-link {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: var(--ls-mid);
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            white-space: nowrap;
        }
        .oro-link i { font-size: 0.75rem; }
        @media (hover: hover) and (pointer: fine) {
            .oro-link:hover {
                color: var(--cosmic-purple);
                border-color: rgba(125,125,125,0.3);
                background: var(--card-hover);
            }
        }

        #page { max-width: 48rem; margin: 0 auto; padding: 3rem 1.5rem 0; }

        .filters {
            display: flex; flex-direction: column; gap: 0.6rem;
            margin-bottom: 1.25rem;
        }
        .filters:empty { display: none; }
        .filter-group {
            display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem;
        }
        .filter-label {
            font-size: 0.62rem; text-transform: uppercase;
            letter-spacing: var(--ls-wide); color: var(--text-muted);
            font-weight: 600; margin-right: 0.35rem;
        }
        .chip {
            font-family: inherit; cursor: pointer;
            padding: 0.3rem 0.7rem; border-radius: 999px;
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 0.72rem; font-weight: 500;
            letter-spacing: var(--ls-tight);
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .chip.active {
            color: var(--cosmic-purple);
            border-color: rgba(124,58,237,0.45);
            background: rgba(124,58,237,0.10);
        }
        @media (hover: hover) and (pointer: fine) {
            .chip:hover { color: var(--cosmic-purple); border-color: rgba(125,125,125,0.3); }
        }
        .filter-empty {
            display: none; text-align: center; padding: 3rem 1rem;
            color: var(--text-muted); font-size: 0.8rem; letter-spacing: var(--ls-tight);
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.25rem;
        }
        @media (min-width: 640px) {
            .photo-grid { grid-template-columns: repeat(4, 1fr); }
        }
        .grid-tile {
            aspect-ratio: 1 / 1; overflow: hidden;
            background: var(--card); position: relative; display: block;
            text-decoration: none;
        }
        .grid-tile img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .grid-tile-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0);
            transition: background 0.3s; display: flex; align-items: flex-end; padding: 0.6rem;
        }
        .grid-tile-label {
            color: white; font-size: 0.7rem; font-weight: 500;
            opacity: 0; transform: translateY(4px);
            transition: opacity 0.25s, transform 0.25s;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6); line-height: 1.3;
        }
        .grid-skeleton {
            aspect-ratio: 1 / 1;
            background: var(--card);
            animation: skeleton-pulse 1.4s ease-in-out infinite;
        }
        @keyframes skeleton-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.45; }
        }
        .grid-error {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: var(--ls-tight);
        }
        .grid-error i {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.4;
        }
        .grid-tile:focus-visible {
            outline: 2px solid var(--cosmic-purple);
            outline-offset: 2px;
        }
        @media (hover: hover) and (pointer: fine) {
            .grid-tile:hover img { transform: scale(1.05); }
            .grid-tile:hover .grid-tile-overlay { background: rgba(0,0,0,0.28); }
            .grid-tile:hover .grid-tile-label { opacity: 1; transform: translateY(0); }
        }
        footer {
            padding: 1.5rem 0;
            margin-top: 3rem;
            border-top: 1px solid var(--timeline);
            display: flex; justify-content: space-between;
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: var(--ls-wide); color: var(--text-muted);
        }
        footer a { text-decoration: none; }
    </style>
</head>
<body>
    <div id="top-bar-direct">
        <button class="top-btn" id="theme-toggle" aria-label="Toggle dark mode">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>
    </div>

    <div id="page">
        <header>
            <h1><span class="icon-globe">&#127757;</span>BlUE</h1>
            <a href="oro.html" class="oro-link" aria-label="Open ORO golden hour planner">
                <i class="fa-solid fa-cube"></i>ORO
            </a>
        </header>
        <div class="filters" id="filters"></div>
        <div class="photo-grid" id="grid"></div>
        <div class="filter-empty" id="filter-empty">No posts match these filters.</div>
        <footer>
            <span>&copy; <span id="copy-year"></span> Jasaman Saini</span>
            <a href="index.html">Homepage</a>
        </footer>
    </div>

    <script src="theme.js"></script>
    <script>
    (function() {
        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        var grid = document.getElementById('grid');
        var SKELETON_COUNT = 12;
        for (var s = 0; s < SKELETON_COUNT; s++) {
            var sk = document.createElement('div');
            sk.className = 'grid-skeleton';
            grid.appendChild(sk);
        }

        var filtersEl = document.getElementById('filters');
        var selectedCamera = 'all';
        var selectedYear = 'all';

        function applyFilters() {
            var tiles = grid.querySelectorAll('.grid-tile');
            var shown = 0;
            for (var i = 0; i < tiles.length; i++) {
                var t = tiles[i];
                var ok = (selectedCamera === 'all' || t.dataset.cat === selectedCamera)
                      && (selectedYear === 'all' || t.dataset.year === selectedYear);
                t.style.display = ok ? '' : 'none';
                if (ok) shown++;
            }
            var empty = document.getElementById('filter-empty');
            if (empty) empty.style.display = shown === 0 ? 'block' : 'none';
        }

        function buildChipGroup(label, values, current, onPick) {
            if (values.length < 2) return; // nothing to filter on
            var group = document.createElement('div');
            group.className = 'filter-group';
            var lbl = document.createElement('span');
            lbl.className = 'filter-label';
            lbl.textContent = label;
            group.appendChild(lbl);
            var all = ['all'].concat(values);
            var chips = [];
            all.forEach(function(v) {
                var chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'chip';
                chip.textContent = v === 'all' ? 'All' : v;
                var active = (current() === v);
                chip.setAttribute('aria-pressed', active ? 'true' : 'false');
                if (active) chip.classList.add('active');
                chip.addEventListener('click', function() {
                    onPick(v);
                    chips.forEach(function(c) {
                        var on = c === chip;
                        c.classList.toggle('active', on);
                        c.setAttribute('aria-pressed', on ? 'true' : 'false');
                    });
                    applyFilters();
                });
                chips.push(chip);
                group.appendChild(chip);
            });
            filtersEl.appendChild(group);
        }

        function renderFilters(posts) {
            var cameras = [], years = [];
            posts.forEach(function(p) {
                if (p.category && cameras.indexOf(p.category) === -1) cameras.push(p.category);
                if (p.date && years.indexOf(String(p.date)) === -1) years.push(String(p.date));
            });
            years.sort(function(a, b) { return b.localeCompare(a); });
            buildChipGroup('Camera', cameras, function() { return selectedCamera; }, function(v) { selectedCamera = v; });
            buildChipGroup('Year', years, function() { return selectedYear; }, function(v) { selectedYear = v; });
        }

        fetch('posts.json')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                grid.innerHTML = '';
                var BASE = data.base;
                data.posts.forEach(function(p, i) {
                    var full  = BASE + p.imageId + '_' + p.cover + '.jpg';
                    var src   = p.thumb ? (BASE + p.imageId + '_' + p.cover + '_thumb.jpg') : full;
                    var a   = document.createElement('a');
                    a.className = 'grid-tile';
                    a.href = 'blue-post.html#' + encodeURIComponent(p.id);
                    a.dataset.cat  = p.category || '';
                    a.dataset.year = String(p.date || '');
                    a.innerHTML =
                        '<img src="' + esc(src) + '" alt="' + esc(p.title) + '"'
                        + ' width="400" height="400" decoding="async"'
                        + (i === 0 ? '' : ' loading="lazy"')
                        + (p.thumb ? ' data-full="' + esc(full) + '" onerror="if(this.dataset.full){this.src=this.dataset.full;this.removeAttribute(\'data-full\');}"' : '')
                        + '>'
                        + '<div class="grid-tile-overlay"><div class="grid-tile-label">' + esc(p.title) + '</div></div>';
                    grid.appendChild(a);
                });
                renderFilters(data.posts);
            })
            .catch(function() {
                grid.innerHTML =
                    '<div class="grid-error"><i class="fa-regular fa-image"></i>Could not load posts &mdash; please try again later.</div>';
            });
    })();
    </script>
</body>
</html>
